<!DOCTYPE html>
<!-- Source: rdadmin/license.cpp | Class: License | Screenshot: none -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rivendell Credits</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'app-bg': '#d4d0c8',
        'app-panel': '#ffffff',
        'app-input': '#ffffff',
        'app-btn': '#d4d0c8',
        'app-btn-hover': '#e0dcd4',
        'app-titlebar': '#4a6ea5',
        'app-text': '#000000',
        'app-border': '#808080',
        'app-border-light': '#ffffff',
        'app-border-dark': '#404040',
      },
      borderRadius: { 'app': '0px' },
      fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' },
    }
  }
}
</script>
<style>
  .qt-btn {
    box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff;
    font-family: 'Helvetica', 'Arial', system-ui, sans-serif;
    font-size: 0.875rem;
  }
  .qt-textarea {
    box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff;
    font-family: 'Helvetica', 'Arial', system-ui, sans-serif;
    font-size: 0.8125rem;
  }
  body { font-family: 'Helvetica', 'Arial', system-ui, sans-serif; }
</style>
</head>
<body class="bg-app-bg flex items-center justify-center min-h-screen">
  <div class="bg-app-bg border border-app-border" style="width:600px; height:400px; position:relative;">
    <!-- Title bar -->
    <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-0.5" style="font-size:0.75rem;">
      Rivendell Credits
    </div>

    <!-- Text area -->
    <div style="position:absolute; top:22px; left:10px; right:10px; bottom:60px;">
      <textarea data-widget="license_edit" readonly class="qt-textarea bg-app-input border border-app-border rounded-app w-full h-full p-2 resize-none" style="font-size:0.8125rem;">
Rivendell Radio Automation

Credits:
  Fred Gleason - Primary Developer
  ... (credits content loaded at runtime)
      </textarea>
    </div>

    <!-- Close button -->
    <div style="position:absolute; bottom:10px; right:10px;">
      <button data-widget="close_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:80px;height:40px;">Close</button>
    </div>
  </div>
</body>
</html>
