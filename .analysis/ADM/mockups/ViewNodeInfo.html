<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ViewNodeInfo – Viewing Livewire Node</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 0.875rem; background: #d4d0c8; color: #000; }
  .window { width: 400px; margin: 20px auto; background: #d4d0c8; border: 2px outset #d4d0c8; }
  .titlebar { background: #4a6ea5; color: #fff; padding: 3px 6px; font-weight: 700; font-size: 0.875rem; }
  .content { padding: 10px; }
  .form-row { display: flex; align-items: center; margin-bottom: 2px; }
  label { font-size: 0.8125rem; font-weight: 400; text-align: right; padding-right: 4px; }
  input[type=text] { font-size: 0.8125rem; border: 2px inset #d4d0c8; padding: 1px 4px; background: #eee; }
  .section-label { font-size: 0.8125rem; font-weight: 700; margin: 6px 0 2px 5px; }
  table.list { width: 100%; border-collapse: collapse; background: #fff; border: 2px inset #d4d0c8; margin-bottom: 6px; }
  table.list th { background: #d4d0c8; border: 1px solid #808080; padding: 2px 4px; font-size: 0.75rem; text-align: left; }
  table.list td { border: 1px solid #e0e0e0; padding: 2px 4px; font-size: 0.75rem; }
  .button-bar { display: flex; justify-content: flex-end; margin-top: 10px; }
  button { font-family: Helvetica, Arial, sans-serif; font-size: 0.8125rem; padding: 4px 16px; min-width: 80px; min-height: 50px; background: #d4d0c8; border: 2px outset #d4d0c8; cursor: pointer; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">RDAdmin - Viewing Livewire Node</div>
  <div class="content">
    <div class="form-row">
      <label style="width:80px;">Hostname:</label>
      <input type="text" style="width:190px;" value="192.168.1.10" readonly>
      <label style="width:30px;">Port:</label>
      <input type="text" style="width:55px;" value="93" readonly>
    </div>
    <div class="form-row">
      <label style="width:120px;">System Version:</label>
      <input type="text" style="width:70px;" value="6.19.7b" readonly>
      <label style="width:100px;">Protocol Version:</label>
      <input type="text" style="width:40px;" value="2.7" readonly>
    </div>
    <div class="form-row">
      <label style="width:60px;">Sources:</label>
      <input type="text" style="width:30px;" value="8" readonly>
      <label style="width:80px;">Destinations:</label>
      <input type="text" style="width:30px;" value="8" readonly>
      <label style="width:60px;">Channels:</label>
      <input type="text" style="width:30px;" value="2" readonly>
    </div>
    <div class="form-row">
      <label style="width:120px;">GPIs:</label>
      <input type="text" style="width:70px;" value="40 [8 X 5]" readonly>
      <label style="width:90px;">GPOs:</label>
      <input type="text" style="width:70px;" value="40 [8 X 5]" readonly>
    </div>

    <div class="section-label">Sources</div>
    <table class="list" style="height:120px;">
      <thead><tr><th style="text-align:center;">#</th><th style="text-align:right;">Input #</th><th>Name</th><th style="text-align:center;">Active</th><th style="text-align:center;">Shareable</th><th style="text-align:center;">Chans</th><th style="text-align:center;">Gain</th></tr></thead>
      <tbody>
        <tr><td style="text-align:center;">1</td><td style="text-align:right;">101</td><td>Mic 1</td><td style="text-align:center;">Yes</td><td style="text-align:center;">No</td><td style="text-align:center;">2</td><td style="text-align:center;">0.0</td></tr>
        <tr><td style="text-align:center;">2</td><td style="text-align:right;">[unassigned]</td><td>Line In</td><td style="text-align:center;">No</td><td style="text-align:center;">Yes</td><td style="text-align:center;">2</td><td style="text-align:center;">-3.5</td></tr>
      </tbody>
    </table>

    <div class="section-label">Destinations</div>
    <table class="list" style="height:120px;">
      <thead><tr><th style="text-align:center;">#</th><th style="text-align:right;">Output #</th><th>Name</th><th style="text-align:center;">Chans</th><th style="text-align:center;">Load</th><th style="text-align:center;">Gain</th></tr></thead>
      <tbody>
        <tr><td style="text-align:center;">1</td><td style="text-align:right;">1</td><td>Speaker L</td><td style="text-align:center;">2</td><td style="text-align:center;">Hi-Z</td><td style="text-align:center;">0.0</td></tr>
      </tbody>
    </table>

    <div class="button-bar">
      <button>&amp;Close</button>
    </div>
  </div>
</div>
</body>
</html>
