<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AddSvc - RDAdmin - Add Service</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwindcss.config = {
  theme: { extend: {
    colors: { 'app-bg':'#d4d0c8','app-panel':'#ffffff','app-input':'#ffffff','app-btn':'#d4d0c8','app-btn-hover':'#e0dcd4','app-titlebar':'#4a6ea5','app-selection':'#0a246a','app-text':'#000000','app-border':'#808080','app-border-light':'#ffffff','app-border-dark':'#404040' },
    borderRadius: { 'app':'0px' },
    fontSize: { 'app-label':'0.8125rem','app-title':'0.875rem' }
  }}
}
</script>
<style>
  .btn-3d { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .input-sunken { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
</style>
</head>
<body class="bg-app-bg font-['Helvetica','Arial',system-ui,sans-serif] text-app-text text-app-title">
<div class="w-[350px] h-[135px] border border-app-border" data-widget="AddSvc" data-window-title="RDAdmin - Add Service">
  <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-1">RDAdmin - Add Service</div>
  <div class="p-2">
    <div class="flex items-center mb-1">
      <label class="w-[140px] text-right text-app-label pr-2">New Service Name:</label>
      <input type="text" maxlength="10" class="flex-1 border-2 border-app-border input-sunken bg-app-input text-app-label px-1 h-[19px]" data-widget="svc_name_edit">
    </div>
    <div class="flex items-center mb-2">
      <label class="w-[140px] text-right text-app-label pr-2">Base Service On:</label>
      <select class="flex-1 border border-app-border bg-app-input text-app-label h-[19px]" data-widget="svc_exemplar_box">
        <option>Empty Host Config</option>
        <option>CHUM</option>
        <option>Production</option>
      </select>
    </div>
    <div class="flex justify-end gap-2 mt-1">
      <button class="bg-app-btn btn-3d rounded-app px-4 py-3 text-app-label w-[80px]" data-widget="ok_button">OK</button>
      <button class="bg-app-btn btn-3d rounded-app px-4 py-3 text-app-label w-[80px]" data-widget="cancel_button">Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
