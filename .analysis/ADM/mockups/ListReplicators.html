<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ListReplicators - RDAdmin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'app-bg': '#d4d0c8',
        'app-panel': '#ffffff',
        'app-btn': '#d4d0c8',
        'app-btn-hover': '#e0dcd4',
        'app-selection': '#0a246a',
        'app-text': '#000000',
        'app-border': '#808080',
        'app-border-light': '#ffffff',
        'app-border-dark': '#404040',
      },
      borderRadius: { 'app': '0px' },
      fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' }
    }
  }
}
</script>
<style>
  .qt-btn { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .qt-btn:active { box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #ffffff; }
  .qt-input { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
  .qt-listview { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
  .qt-header { background: #d4d0c8; border-bottom: 1px solid #808080; font-weight: bold; font-size: 0.75rem; }
  .qt-row-selected { background: #0a246a; color: #ffffff; }
</style>
</head>
<body class="bg-app-bg flex items-start justify-center pt-8" style="font-family: Helvetica, Arial, system-ui, sans-serif;">

<div class="bg-app-bg border border-app-border" style="width:640px; height:480px; position:relative;">
  <!-- Title bar -->
  <div class="bg-[#4a6ea5] text-white text-app-title font-bold px-2 py-1 flex items-center gap-2">
    <span>Rivendell Replicators</span>
  </div>

  <div class="p-3 h-full" style="padding-bottom: 0;">
    <!-- Label -->
    <label class="text-app-label font-normal text-app-text block mb-1">Replicators:</label>

    <!-- List view -->
    <div class="qt-listview bg-white border border-app-border" style="position:absolute; left:10px; top:55px; right:120px; bottom:15px; overflow:auto;">
      <!-- Header -->
      <div class="qt-header flex text-xs px-1 py-0.5">
        <div style="width:80px">NAME</div>
        <div style="width:150px">TYPE</div>
        <div style="width:200px">DESCRIPTION</div>
        <div style="width:120px">HOST</div>
      </div>
      <!-- Row selected -->
      <div class="qt-row-selected flex text-xs px-1 py-0.5">
        <div style="width:80px">XDS</div>
        <div style="width:150px">Citadel X-Digital Portal</div>
        <div style="width:200px">X-Digital Copysplit Feed</div>
        <div style="width:120px">gazerbeam</div>
      </div>
    </div>

    <!-- Buttons column -->
    <div style="position:absolute; right:10px; top:55px; width:80px;">
      <button class="qt-btn bg-app-btn text-app-text text-app-label w-full py-3 mb-2 rounded-app border border-app-border">Add</button>
      <button class="qt-btn bg-app-btn text-app-text text-app-label w-full py-3 mb-2 rounded-app border border-app-border">Edit</button>
      <button class="qt-btn bg-app-btn text-app-text text-app-label w-full py-3 mb-2 rounded-app border border-app-border">Delete</button>
      <div class="mb-8"></div>
      <button class="qt-btn bg-app-btn text-app-text text-app-label w-full py-3 mb-2 rounded-app border border-app-border leading-tight">List<br>Carts</button>
    </div>

    <!-- Close button -->
    <div style="position:absolute; right:10px; bottom:15px; width:80px;">
      <button class="qt-btn bg-app-btn text-app-text text-app-label w-full py-3 rounded-app border border-app-border font-bold">Close</button>
    </div>
  </div>
</div>

</body>
</html>
