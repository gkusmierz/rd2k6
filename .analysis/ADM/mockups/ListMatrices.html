<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ListMatrices - Rivendell Switcher List</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica', 'Arial', system-ui, sans-serif; font-size: 0.875rem; background: #d4d0c8; color: #000; }
  .dialog { width: 400px; min-height: 300px; margin: 20px auto; background: #d4d0c8; border: 2px outset #d4d0c8; padding: 4px; }
  .titlebar { background: #4a6ea5; color: #fff; font-weight: 700; font-size: 0.875rem; padding: 2px 6px; margin-bottom: 4px; }
  .content { padding: 4px 10px; }
  label.section { font-size: 0.8125rem; font-weight: 700; display: block; margin-bottom: 2px; }
  .listview { width: 100%; border: 2px inset #d4d0c8; background: #fff; margin-bottom: 8px; min-height: 180px; }
  .listview table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
  .listview th { background: #d4d0c8; border: 1px outset #d4d0c8; text-align: left; padding: 2px 5px; font-weight: 700; }
  .listview td { padding: 2px 5px; border-bottom: 1px solid #e0e0e0; }
  .listview tr.selected { background: #0a246a; color: #fff; }
  .listview th:first-child, .listview td:first-child { text-align: center; width: 60px; }
  .button-bar { display: flex; gap: 10px; padding: 4px 0; }
  .button-bar .spacer { flex: 1; }
  button { font-family: inherit; font-size: 0.875rem; background: #d4d0c8; border: 2px outset #d4d0c8; padding: 4px 16px; min-width: 80px; min-height: 50px; cursor: pointer; }
  button:hover { background: #e0dcd4; }
  button:active { border-style: inset; }
</style>
</head>
<body>
<div class="dialog">
  <div class="titlebar">RDAdmin - Rivendell Switcher List</div>
  <div class="content">
    <label class="section">Switchers:</label>
    <div class="listview">
      <table>
        <thead><tr><th>MATRIX</th><th>DESCRIPTION</th><th>TYPE</th></tr></thead>
        <tbody>
          <tr><td>0</td><td>PathFinder</td><td>Software Authority Protocol</td></tr>
          <tr><td>1</td><td>Control Room Switcher</td><td>BroadcastTools SS4.4</td></tr>
          <tr class="selected"><td>2</td><td>TOC Switcher</td><td>SAS USI</td></tr>
        </tbody>
      </table>
    </div>
    <div class="button-bar">
      <button>Add</button>
      <button>Edit</button>
      <button>Delete</button>
      <span class="spacer"></span>
      <button>Close</button>
    </div>
  </div>
</div>
</body>
</html>
