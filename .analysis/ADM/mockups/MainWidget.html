<!DOCTYPE html>
<!-- Source: rdadmin/rdadmin.cpp | Class: MainWidget | Screenshot: docs/opsguide/rdadmin.rdadmin_screenshot.png -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDAdmin v2.17.0 - Host: localhost</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'app-bg': '#d4d0c8',
        'app-panel': '#ffffff',
        'app-input': '#ffffff',
        'app-btn': '#d4d0c8',
        'app-btn-hover': '#e0dcd4',
        'app-titlebar': '#4a6ea5',
        'app-selection': '#0a246a',
        'app-text': '#000000',
        'app-text-sec': '#4a4a4a',
        'app-border': '#808080',
        'app-border-light': '#ffffff',
        'app-border-dark': '#404040',
        'app-accent': '#0a246a',
        'app-error': '#cc0000',
      },
      borderRadius: { 'app': '0px' },
      fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' },
    }
  }
}
</script>
<style>
  .qt-btn {
    box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff;
    font-family: 'Helvetica', 'Arial', system-ui, sans-serif;
    font-size: 0.875rem;
  }
  .qt-btn:active {
    box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #ffffff;
  }
  body { font-family: 'Helvetica', 'Arial', system-ui, sans-serif; }
</style>
</head>
<body class="bg-app-bg flex items-center justify-center min-h-screen">
  <div class="bg-app-bg border border-app-border" style="width:370px; height:330px; position:relative;">
    <!-- Title bar -->
    <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-0.5 flex items-center gap-1" style="font-size:0.75rem;">
      <span>RDAdmin v2.17.0 - Host: localhost</span>
    </div>

    <!-- User labels -->
    <div class="text-center" style="position:absolute; top:22px; width:370px;">
      <div class="font-bold text-app-title" data-widget="name_label">USER: admin</div>
      <div class="text-app-label" data-widget="description_label">Default Administrator Account</div>
    </div>

    <!-- Button grid - Row 1 -->
    <div style="position:absolute; top:55px; left:10px;">
      <button data-widget="users_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text px-1 py-1" style="width:80px;height:60px;">Manage<br>Users</button>
    </div>
    <div style="position:absolute; top:55px; left:100px;">
      <button data-widget="services_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text px-1 py-1" style="width:80px;height:60px;">Manage<br>Services</button>
    </div>
    <div style="position:absolute; top:55px; left:190px;">
      <button data-widget="reports_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text px-1 py-1" style="width:80px;height:60px;">Manage<br>Reports</button>
    </div>
    <div style="position:absolute; top:55px; left:280px;">
      <button data-widget="podcasts_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text px-1 py-1" style="width:80px;height:60px;">Manage<br>Feeds</button>
    </div>

    <!-- Button grid - Row 2 -->
    <div style="position:absolute; top:125px; left:10px;">
      <button data-widget="groups_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text px-1 py-1" style="width:80px;height:60px;">Manage<br>Groups</button>
    </div>
    <div style="position:absolute; top:125px; left:100px;">
      <button data-widget="stations_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text px-1 py-1" style="width:80px;height:60px;">Manage<br>Hosts</button>
    </div>
    <div style="position:absolute; top:125px; left:190px;">
      <button data-widget="system_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text px-1 py-1" style="width:80px;height:60px;">System<br>Settings</button>
    </div>
    <div style="position:absolute; top:125px; left:280px;">
      <button data-widget="schedcodes_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text px-1 py-1" style="width:80px;height:60px;">Scheduler<br>Codes</button>
    </div>

    <!-- Button grid - Row 3 -->
    <div style="position:absolute; top:195px; left:100px;">
      <button data-widget="repl_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text px-1 py-1" style="width:80px;height:60px;">Manage<br>Replicators</button>
    </div>
    <div style="position:absolute; top:195px; left:190px;">
      <button data-widget="info_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text px-1 py-1" style="width:80px;height:60px;">System<br>Info</button>
    </div>

    <!-- Quit button -->
    <div style="position:absolute; top:265px; left:10px;">
      <button data-widget="quit_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text font-bold" style="width:350px;height:55px;">Quit</button>
    </div>
  </div>
</body>
</html>
