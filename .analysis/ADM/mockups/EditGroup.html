<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EditGroup - RDAdmin - Group: PROGRAMS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    'app-bg':'#d4d0c8','app-panel':'#ffffff','app-input':'#ffffff',
    'app-btn':'#d4d0c8','app-btn-hover':'#e0dcd4','app-titlebar':'#4a6ea5',
    'app-text':'#000000','app-border':'#808080','app-border-light':'#ffffff','app-border-dark':'#404040'
  }, borderRadius: { 'app':'0px' }, fontSize: { 'app-label':'0.8125rem','app-title':'0.875rem' } } }
}
</script>
<style>
  .qt-btn { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .qt-btn:active { box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #ffffff; }
  .qt-input { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
  .qt-list { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
  body { font-family: 'Helvetica','Arial',system-ui,sans-serif; }
  .form-row { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
  .form-label { width: 200px; text-align: right; font-size: 0.8125rem; font-weight: bold; flex-shrink: 0; }
</style>
</head>
<body class="bg-app-bg p-0 m-0">
<div style="width:500px;min-height:524px;" class="flex flex-col">
  <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-1">RDAdmin - Group: PROGRAMS</div>
  <div class="flex-1 bg-app-bg p-2 text-app-label overflow-auto">
    <!-- Form fields -->
    <div class="form-row"><label class="form-label">Group Name:</label><input data-widget="group_name_edit" type="text" value="PROGRAMS" readonly class="qt-input bg-gray-200 border border-app-border rounded-app px-1 py-0.5 text-app-label" style="width:100px;" /></div>
    <div class="form-row"><label class="form-label">Group Description:</label><input data-widget="group_description_edit" type="text" value="Program Carts" class="qt-input flex-1 bg-app-input border border-app-border rounded-app px-1 py-0.5 text-app-label" /></div>
    <div class="form-row"><label class="form-label">Default Import Title:</label><input data-widget="group_title_edit" type="text" value="Imported from %f.%e" class="qt-input flex-1 bg-app-input border border-app-border rounded-app px-1 py-0.5 text-app-label" /></div>
    <div class="form-row"><label class="form-label">Notification E-Mail Addresses:</label><input data-widget="group_notify_email_addrs_edit" type="text" value="notify@example.com" class="qt-input flex-1 bg-app-input border border-app-border rounded-app px-1 py-0.5 text-app-label" /></div>
    <div class="form-row"><label class="form-label">Default Cart Type:</label>
      <select data-widget="group_carttype_box" class="qt-input bg-app-input border border-app-border rounded-app px-1 py-0.5 text-app-label" style="width:100px;">
        <option selected>Audio</option><option>Macro</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">Default Cart Number:</label>
      <input data-widget="group_lowcart_box" type="number" value="50000" min="0" max="999999" class="qt-input bg-app-input border border-app-border rounded-app px-1 py-0.5 text-app-label" style="width:70px;" />
      <span class="font-bold mx-1">to</span>
      <input data-widget="group_highcart_box" type="number" value="59999" min="1" max="999999" class="qt-input bg-app-input border border-app-border rounded-app px-1 py-0.5 text-app-label" style="width:70px;" />
    </div>

    <!-- Checkboxes -->
    <div class="ml-4 space-y-1 mt-1">
      <label class="flex items-center gap-1"><input data-widget="group_enforcerange_box" type="checkbox" /> <span class="font-bold">Enforce Cart Range</span></label>
      <label class="flex items-center gap-1"><input data-widget="group_traffic_check" type="checkbox" checked /> <span class="font-bold">Include this group in Traffic reports</span></label>
      <label class="flex items-center gap-1"><input data-widget="group_music_check" type="checkbox" checked /> <span class="font-bold">Include this group in Music reports</span></label>
      <div class="flex items-center gap-1">
        <input data-widget="group_cutlife_check" type="checkbox" />
        <span class="font-bold">Set End Date/Time to</span>
        <input data-widget="group_cutlife_spin" type="number" value="0" min="0" max="999" disabled class="qt-input bg-gray-200 border border-app-border rounded-app px-1 py-0.5 text-app-label" style="width:45px;" />
        <span class="font-bold">days after cut creation</span>
      </div>
      <div class="flex items-center gap-1">
        <input data-widget="group_shelflife_check" type="checkbox" />
        <span class="font-bold">Purge expired cuts after</span>
        <input data-widget="group_shelflife_spin" type="number" value="0" min="0" max="30" disabled class="qt-input bg-gray-200 border border-app-border rounded-app px-1 py-0.5 text-app-label" style="width:40px;" />
        <span class="font-bold">days</span>
      </div>
      <label class="flex items-center gap-1 ml-4"><input data-widget="group_delete_carts_check" type="checkbox" disabled /> <span class="font-bold text-app-text-sec">Delete cart if empty</span></label>
      <label class="flex items-center gap-1"><input data-widget="group_nownext_check" type="checkbox" checked /> <span class="font-bold">Transmit Now &amp; Next data</span></label>
    </div>

    <!-- Services selector -->
    <div data-widget="group_svcs_sel" class="flex gap-2 mt-2" style="height:120px;">
      <div class="flex-1 flex flex-col">
        <label class="font-bold mb-0.5">Available Services</label>
        <div class="flex-1 bg-app-panel qt-list border border-app-border overflow-auto">
          <div class="p-1">REL-FAIL</div>
          <div class="p-1">REL-PASS</div>
        </div>
      </div>
      <div class="flex flex-col justify-center gap-1">
        <button class="qt-btn bg-app-btn text-app-text text-xs px-2 py-1 border border-app-border rounded-app">Add &gt;&gt;</button>
        <button class="qt-btn bg-app-btn text-app-text text-xs px-2 py-1 border border-app-border rounded-app">&lt;&lt; Remove</button>
      </div>
      <div class="flex-1 flex flex-col">
        <label class="font-bold mb-0.5">Active Services</label>
        <div class="flex-1 bg-app-panel qt-list border border-app-border overflow-auto">
          <div class="p-1">CHUM</div>
          <div class="p-1">Production</div>
          <div class="p-1">TEST</div>
          <div class="p-1">WXYZ</div>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex mt-3">
      <button data-widget="group_color_button" class="qt-btn bg-app-btn text-app-text text-app-label px-4 py-2 border border-app-border rounded-app hover:bg-app-btn-hover" style="width:80px;height:45px;">Color</button>
      <div class="flex-1"></div>
      <button data-widget="group_ok_button" class="qt-btn bg-app-btn text-app-text text-app-label px-4 py-2 border border-app-border rounded-app hover:bg-app-btn-hover font-bold mr-2" style="width:80px;height:45px;">OK</button>
      <button data-widget="group_cancel_button" class="qt-btn bg-app-btn text-app-text text-app-label px-4 py-2 border border-app-border rounded-app hover:bg-app-btn-hover" style="width:80px;height:45px;">Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
