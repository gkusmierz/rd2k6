<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ListFeeds – Rivendell Feed List</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 0.875rem; background: #d4d0c8; color: #000; }
  .window { width: 800px; margin: 20px auto; background: #d4d0c8; border: 2px outset #d4d0c8; }
  .titlebar { background: #4a6ea5; color: #fff; padding: 3px 6px; font-weight: 700; font-size: 0.875rem; }
  .content { padding: 10px; display: flex; gap: 10px; }
  .list-label { font-size: 0.875rem; font-weight: 700; margin-bottom: 2px; }
  table.list { width: 100%; border-collapse: collapse; background: #fff; border: 2px inset #d4d0c8; }
  table.list th { background: #d4d0c8; border: 1px solid #808080; padding: 2px 5px; font-size: 0.8125rem; text-align: left; }
  table.list td { border: 1px solid #e0e0e0; padding: 2px 5px; font-size: 0.8125rem; }
  table.list td.center { text-align: center; }
  table.list tr.selected { background: #0a246a; color: #fff; }
  .list-panel { flex: 1; }
  .btn-panel { display: flex; flex-direction: column; gap: 10px; width: 80px; }
  .btn-panel .spacer { flex: 1; }
  button { font-family: Helvetica, Arial, sans-serif; font-size: 0.8125rem; padding: 4px 4px; min-width: 80px; min-height: 50px; background: #d4d0c8; border: 2px outset #d4d0c8; cursor: pointer; }
  button:active { border-style: inset; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">RDAdmin - Rivendell Feed List</div>
  <div class="content">
    <div class="list-panel">
      <div class="list-label">Podcast Feeds</div>
      <table class="list" style="height:350px;">
        <thead><tr><th style="width:32px;text-align:center;">&nbsp;</th><th style="text-align:center;">Key</th><th>Title</th><th>Public URL</th><th style="text-align:center;">Superfeed</th><th style="text-align:center;">AutoPost</th><th style="text-align:center;">Creation Date</th></tr></thead>
        <tbody>
          <tr class="selected">
            <td class="center">&#x1f4e1;</td><td class="center">MYPOD</td><td>My Podcast</td><td>https://example.com/feeds/MYPOD</td><td class="center">N</td><td class="center">Y</td><td class="center">01/15/2025</td>
          </tr>
          <tr>
            <td class="center">&#x1f4e1;</td><td class="center">SUPER1</td><td>Super Feed</td><td>https://example.com/feeds/SUPER1</td><td class="center">Y</td><td class="center">N</td><td class="center">03/01/2025</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="btn-panel">
      <button>&amp;Add</button>
      <button>&amp;Edit</button>
      <button>&amp;Delete</button>
      <span class="spacer"></span>
      <button>&amp;Repost</button>
      <button>&amp;Unpost</button>
      <span class="spacer"></span>
      <button>&amp;Close</button>
    </div>
  </div>
</div>
</body>
</html>
