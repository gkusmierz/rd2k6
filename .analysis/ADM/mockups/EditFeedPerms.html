<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EditFeedPerms - RDAdmin - User: user</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    'app-bg':'#d4d0c8','app-panel':'#ffffff','app-input':'#ffffff',
    'app-btn':'#d4d0c8','app-btn-hover':'#e0dcd4','app-titlebar':'#4a6ea5',
    'app-text':'#000000','app-border':'#808080','app-border-light':'#ffffff','app-border-dark':'#404040'
  }, borderRadius: { 'app':'0px' }, fontSize: { 'app-label':'0.8125rem','app-title':'0.875rem' } } }
}
</script>
<style>
  .qt-btn { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .qt-btn:active { box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #ffffff; }
  .qt-list { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
  body { font-family: 'Helvetica','Arial',system-ui,sans-serif; }
</style>
</head>
<body class="bg-app-bg p-0 m-0">
<div style="width:400px;height:212px;" class="flex flex-col">
  <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-1">RDAdmin - User: user</div>
  <div class="flex-1 bg-app-bg p-2">
    <div data-widget="feed_host_sel" class="flex gap-2 mb-2" style="height:120px;">
      <div class="flex-1 flex flex-col">
        <label class="text-app-label font-bold mb-0.5">Available Feeds</label>
        <div class="flex-1 bg-app-panel qt-list border border-app-border overflow-auto">
          <div class="p-1 text-app-label">Example Feed</div>
        </div>
      </div>
      <div class="flex flex-col justify-center gap-1">
        <button class="qt-btn bg-app-btn text-app-text text-xs px-2 py-1 border border-app-border rounded-app">Add &gt;&gt;</button>
        <button class="qt-btn bg-app-btn text-app-text text-xs px-2 py-1 border border-app-border rounded-app">&lt;&lt; Remove</button>
      </div>
      <div class="flex-1 flex flex-col">
        <label class="text-app-label font-bold mb-0.5">Enabled Feeds</label>
        <div class="flex-1 bg-app-panel qt-list border border-app-border overflow-auto">
          <div class="p-1 text-app-label">My Podcast</div>
        </div>
      </div>
    </div>
    <div class="flex justify-end gap-2">
      <button data-widget="ok_button" class="qt-btn bg-app-btn text-app-text text-app-label px-4 py-2 border border-app-border rounded-app hover:bg-app-btn-hover font-bold" style="width:80px;height:40px;">OK</button>
      <button data-widget="cancel_button" class="qt-btn bg-app-btn text-app-text text-app-label px-4 py-2 border border-app-border rounded-app hover:bg-app-btn-hover" style="width:80px;height:40px;">Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
