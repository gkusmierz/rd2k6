<!DOCTYPE html>
<!-- Source: rdadmin/list_schedcodes.cpp | Class: ListSchedCodes | Screenshot: docs/opsguide/rdadmin.rivendell_scheduler_code_list_dialog.png -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDAdmin - Rivendell Scheduler Codes List</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'app-bg': '#d4d0c8',
        'app-panel': '#ffffff',
        'app-input': '#ffffff',
        'app-btn': '#d4d0c8',
        'app-btn-hover': '#e0dcd4',
        'app-titlebar': '#4a6ea5',
        'app-text': '#000000',
        'app-border': '#808080',
        'app-border-light': '#ffffff',
        'app-border-dark': '#404040',
      },
      borderRadius: { 'app': '0px' },
      fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' },
    }
  }
}
</script>
<style>
  .qt-btn {
    box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff;
    font-family: 'Helvetica', 'Arial', system-ui, sans-serif;
    font-size: 0.875rem;
  }
  .qt-list {
    box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff;
  }
  body { font-family: 'Helvetica', 'Arial', system-ui, sans-serif; }
  .list-header { background: #d4d0c8; border-bottom: 1px solid #808080; padding: 2px 5px; font-weight: bold; font-size: 0.8125rem; display: flex; }
  .list-item { padding: 3px 5px; font-size: 0.8125rem; border-bottom: 1px solid #e0e0e0; display: flex; }
  .list-item:hover { background: #0a246a; color: #fff; }
  .col-code { width: 80px; }
  .col-desc { flex: 1; }
</style>
</head>
<body class="bg-app-bg flex items-center justify-center min-h-screen">
  <div class="bg-app-bg border border-app-border" style="width:640px; height:480px; position:relative;">
    <!-- Title bar -->
    <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-0.5" style="font-size:0.75rem;">
      Rivendell Scheduler Codes List
    </div>

    <!-- Label -->
    <div style="position:absolute; top:24px; left:14px;" class="font-bold text-app-label" data-widget="list_box_label">
      Scheduler Codes:
    </div>

    <!-- List view -->
    <div data-widget="list_schedCodes_view" class="qt-list bg-app-input border border-app-border overflow-auto" style="position:absolute; top:44px; left:14px; right:100px; bottom:14px;">
      <div class="list-header">
        <span class="col-code">CODE</span>
        <span class="col-desc">DESCRIPTION</span>
      </div>
      <div class="list-item">
        <span class="col-code">FRED</span>
        <span class="col-desc">Freds Favorites</span>
      </div>
      <div class="list-item">
        <span class="col-code">WCR-A</span>
        <span class="col-desc"></span>
      </div>
      <div class="list-item">
        <span class="col-code">WCR-B</span>
        <span class="col-desc"></span>
      </div>
      <div class="list-item">
        <span class="col-code">WCR-E</span>
        <span class="col-desc">The Beatles</span>
      </div>
      <div class="list-item">
        <span class="col-code">WCR-X</span>
        <span class="col-desc">Christmas Music</span>
      </div>
    </div>

    <!-- Buttons (right side, stacked) -->
    <div style="position:absolute; top:50px; right:14px; display:flex; flex-direction:column; gap:20px;">
      <button data-widget="list_add_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:80px;height:50px;">Add</button>
      <button data-widget="list_edit_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:80px;height:50px;">Edit</button>
      <button data-widget="list_delete_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:80px;height:50px;">Delete</button>
    </div>
    <div style="position:absolute; bottom:14px; right:14px;">
      <button data-widget="list_close_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:80px;height:50px;">Close</button>
    </div>
  </div>
</body>
</html>
