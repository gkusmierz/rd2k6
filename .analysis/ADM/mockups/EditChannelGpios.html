<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EditChannelGpios – Edit Channel GPIOs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 0.875rem; background: #d4d0c8; color: #000; }
  .window { width: 300px; margin: 20px auto; background: #d4d0c8; border: 2px outset #d4d0c8; }
  .titlebar { background: #4a6ea5; color: #fff; padding: 3px 6px; font-weight: 700; font-size: 0.875rem; }
  .content { padding: 10px; }
  .title { text-align: center; font-weight: 700; font-size: 0.875rem; margin-bottom: 8px; }
  .form-row { display: flex; align-items: center; margin-bottom: 2px; }
  label { font-size: 0.8125rem; text-align: right; padding-right: 4px; width: 120px; }
  input.spin { font-size: 0.8125rem; border: 2px inset #d4d0c8; padding: 1px 4px; background: #fff; width: 60px; text-align: right; }
  select { font-size: 0.8125rem; border: 2px inset #d4d0c8; padding: 1px 4px; background: #fff; width: 80px; }
  .button-bar { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
  button { font-family: Helvetica, Arial, sans-serif; font-size: 0.8125rem; padding: 4px 16px; min-width: 80px; min-height: 50px; background: #d4d0c8; border: 2px outset #d4d0c8; cursor: pointer; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">RDAdmin - Edit Channel GPIOs</div>
  <div class="content">
    <div class="title">Main Log Output 1</div>
    <div class="form-row">
      <label>Start GPI:</label>
      <input type="text" class="spin" value="1">
      <input type="text" class="spin" style="margin-left:10px;" value="1">
    </div>
    <div class="form-row">
      <label>Start GPO:</label>
      <input type="text" class="spin" value="1">
      <input type="text" class="spin" style="margin-left:10px;" value="4">
    </div>
    <div class="form-row">
      <label>Stop GPI:</label>
      <input type="text" class="spin" value="1">
      <input type="text" class="spin" style="margin-left:10px;" value="1">
    </div>
    <div class="form-row">
      <label>Stop GPO:</label>
      <input type="text" class="spin" value="1">
      <input type="text" class="spin" style="margin-left:10px;" value="5">
    </div>
    <div class="form-row">
      <label>Signalling Type:</label>
      <select><option selected>Edge</option><option>Level</option></select>
    </div>
    <div class="button-bar">
      <button>OK</button>
      <button>Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
