<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EditNode – Edit LiveWire Node</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 0.875rem; background: #d4d0c8; color: #000; }
  .window { width: 400px; margin: 20px auto; background: #d4d0c8; border: 2px outset #d4d0c8; }
  .titlebar { background: #4a6ea5; color: #fff; padding: 3px 6px; font-weight: 700; font-size: 0.875rem; }
  .content { padding: 10px; }
  .form-row { display: flex; align-items: center; margin-bottom: 2px; }
  label { font-size: 0.8125rem; text-align: right; padding-right: 4px; }
  input[type=text], input[type=password] { font-size: 0.8125rem; border: 2px inset #d4d0c8; padding: 1px 4px; background: #fff; }
  input.spin { width: 60px; text-align: right; }
  .button-bar { display: flex; gap: 10px; margin-top: 16px; }
  .button-bar .spacer { flex: 1; }
  button { font-family: Helvetica, Arial, sans-serif; font-size: 0.8125rem; padding: 4px 16px; min-width: 80px; min-height: 50px; background: #d4d0c8; border: 2px outset #d4d0c8; cursor: pointer; }
  button:active { border-style: inset; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">RDAdmin - Edit LiveWire Node</div>
  <div class="content">
    <div class="form-row">
      <label style="width:80px;">Hostname:</label>
      <input type="text" style="width:190px;" value="192.168.1.10">
      <label style="width:45px; margin-left:10px;">Port:</label>
      <input type="text" class="spin" value="93">
    </div>
    <div class="form-row">
      <label style="width:80px;">Description:</label>
      <input type="text" style="width:290px;" value="Studio A Node">
    </div>
    <div class="form-row">
      <label style="width:80px;">First Output:</label>
      <input type="text" class="spin" value="1">
      <label style="width:80px; margin-left:10px;">Password:</label>
      <input type="password" style="width:90px;" value="********">
    </div>
    <div class="button-bar">
      <button>&amp;View Node<br>Info</button>
      <span class="spacer"></span>
      <button>&amp;OK</button>
      <button>&amp;Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
