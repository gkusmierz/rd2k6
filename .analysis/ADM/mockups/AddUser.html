<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AddUser - RDAdmin - Add User</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    'app-bg':'#d4d0c8','app-panel':'#ffffff','app-input':'#ffffff',
    'app-btn':'#d4d0c8','app-btn-hover':'#e0dcd4','app-titlebar':'#4a6ea5',
    'app-text':'#000000','app-border':'#808080','app-border-light':'#ffffff','app-border-dark':'#404040'
  }, borderRadius: { 'app':'0px' }, fontSize: { 'app-label':'0.8125rem','app-title':'0.875rem' } } }
}
</script>
<style>
  .qt-btn { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .qt-btn:active { box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #ffffff; }
  .qt-input { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
  body { font-family: 'Helvetica','Arial',system-ui,sans-serif; }
</style>
</head>
<body class="bg-app-bg p-0 m-0">
<div style="width:400px;height:110px;" class="flex flex-col">
  <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-1">RDAdmin - Add User</div>
  <div class="flex-1 bg-app-bg p-3">
    <div class="flex items-center gap-2 mb-3">
      <label class="text-app-label font-bold text-right" style="width:120px;">New User Name:</label>
      <input data-widget="user_name_edit" type="text" maxlength="255" class="qt-input flex-1 bg-app-input border border-app-border rounded-app px-1 py-0.5 text-app-label" />
    </div>
    <div class="flex justify-end gap-2">
      <button data-widget="ok_button" class="qt-btn bg-app-btn text-app-text text-app-label px-4 py-2 border border-app-border rounded-app hover:bg-app-btn-hover font-bold" style="width:80px;height:40px;">OK</button>
      <button data-widget="cancel_button" class="qt-btn bg-app-btn text-app-text text-app-label px-4 py-2 border border-app-border rounded-app hover:bg-app-btn-hover" style="width:80px;height:40px;">Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
