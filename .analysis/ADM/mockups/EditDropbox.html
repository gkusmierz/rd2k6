<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EditDropbox - Dropbox Configuration</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwindcss.config = {
  theme: { extend: {
    colors: { 'app-bg':'#d4d0c8','app-panel':'#ffffff','app-input':'#ffffff','app-btn':'#d4d0c8','app-btn-hover':'#e0dcd4','app-titlebar':'#4a6ea5','app-text':'#000000','app-border':'#808080','app-border-light':'#ffffff','app-border-dark':'#404040' },
    borderRadius: { 'app':'0px' },
    fontSize: { 'app-label':'0.8125rem','app-title':'0.875rem' }
  }}
}
</script>
<style>
  .btn-3d { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .input-sunken { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
</style>
</head>
<body class="bg-app-bg font-['Helvetica','Arial',system-ui,sans-serif] text-app-text text-app-label">
<div class="w-[490px] h-[666px] border border-app-border" data-widget="EditDropbox" data-window-title="RDAdmin - Dropbox Configuration [ID: 16]">
  <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-1">RDAdmin - Dropbox Configuration [ID: 16]</div>
  <div class="p-2 overflow-auto h-[635px]">
    <!-- Group -->
    <div class="flex items-center mb-0.5">
      <label class="w-[125px] text-right pr-2 font-bold">Default Group:</label>
      <select class="w-[100px] border border-app-border bg-app-input h-[20px]" data-widget="box_group_name_box">
        <option>BEDS</option>
        <option>MUSIC</option>
      </select>
    </div>
    <!-- Path -->
    <div class="flex items-center mb-0.5">
      <label class="w-[125px] text-right pr-2 font-bold">Path Spec:</label>
      <input type="text" value="/home/fredg/dropbox/*" class="flex-1 border-2 border-app-border input-sunken bg-app-input text-app-label px-1 h-[19px]" data-widget="box_path_edit">
      <button class="bg-app-btn btn-3d px-2 py-0.5 text-[0.75rem] ml-1" data-widget="path_select_button">Select</button>
    </div>
    <!-- To Cart -->
    <div class="flex items-center mb-0.5">
      <label class="w-[125px] text-right pr-2 font-bold">To Cart:</label>
      <input type="text" class="w-[60px] border-2 border-app-border input-sunken bg-app-input text-app-label px-1 h-[19px]" data-widget="box_to_cart_edit">
      <button class="bg-app-btn btn-3d px-2 py-0.5 text-[0.75rem] ml-1" data-widget="box_select_cart_button">Select</button>
      <label class="flex items-center gap-1 ml-4"><input type="checkbox" data-widget="box_delete_cuts_box"> Delete cuts before importing</label>
    </div>
    <!-- Metadata Pattern -->
    <div class="flex items-center mb-0.5">
      <label class="w-[125px] text-right pr-2 font-bold">Metadata Pattern:</label>
      <input type="text" class="flex-1 border-2 border-app-border input-sunken bg-app-input text-app-label px-1 h-[19px]" data-widget="box_metadata_pattern_edit">
    </div>
    <!-- User Defined -->
    <div class="flex items-center mb-0.5">
      <label class="w-[125px] text-right pr-2 font-bold">User Defined:</label>
      <input type="text" class="flex-1 border-2 border-app-border input-sunken bg-app-input text-app-label px-1 h-[19px]" data-widget="box_user_defined_edit">
    </div>
    <!-- Logging -->
    <label class="flex items-center gap-1 ml-[40px] mb-0.5"><input type="checkbox" data-widget="box_log_to_syslog_check"> Log events in Syslog</label>
    <div class="flex items-center mb-0.5">
      <label class="w-[125px] text-right pr-2 font-bold">Log File:</label>
      <input type="text" class="flex-1 border-2 border-app-border input-sunken bg-app-input text-app-label px-1 h-[19px]" data-widget="box_log_path_edit">
      <button class="bg-app-btn btn-3d px-2 py-0.5 text-[0.75rem] ml-1" data-widget="box_log_path_button">Select</button>
    </div>
    <!-- Scheduler Codes -->
    <div class="flex justify-center my-1">
      <button class="bg-app-btn btn-3d rounded-app px-6 py-1 text-app-label" data-widget="box_schedcodes_button">Scheduler Codes</button>
    </div>
    <!-- Checkboxes block -->
    <div class="ml-[80px] space-y-0.5">
      <label class="flex items-center gap-1"><input type="checkbox" data-widget="box_delete_source_box"> Delete source files after import</label>
      <label class="flex items-center gap-1"><input type="checkbox" data-widget="box_send_email_box"> Send e-mail reports</label>
      <label class="flex items-center gap-1"><input type="checkbox" data-widget="box_force_to_mono_box"> Force to Monaural</label>
      <!-- Normalization -->
      <div class="flex items-center gap-1">
        <label class="flex items-center gap-1"><input type="checkbox" data-widget="box_normalization_box"> Normalize Levels</label>
        <span class="ml-4 font-bold" data-widget="box_normalization_level_label">Level:</span>
        <input type="number" value="-13" class="w-[50px] border border-app-border input-sunken bg-app-input h-[19px] text-center" data-widget="box_normalization_level_spin">
        <span data-widget="box_normalization_level_unit">dBFS</span>
      </div>
      <!-- Autotrim -->
      <div class="flex items-center gap-1">
        <label class="flex items-center gap-1"><input type="checkbox" data-widget="box_autotrim_box"> Autotrim Cuts</label>
        <span class="ml-4 font-bold" data-widget="box_autotrim_level_label">Level:</span>
        <input type="number" value="-40" class="w-[50px] border border-app-border input-sunken bg-app-input h-[19px] text-center" data-widget="box_autotrim_level_spin">
        <span data-widget="box_autotrim_level_unit">dBFS</span>
      </div>
      <!-- Segue -->
      <label class="flex items-center gap-1"><input type="checkbox" data-widget="box_segue_box"> Insert Segue Markers</label>
      <div class="ml-6 space-y-0.5">
        <div class="flex items-center gap-1">
          <span class="w-[100px] text-right font-bold" data-widget="box_segue_level_label">Segue Level:</span>
          <input type="number" value="-40" class="w-[50px] border border-app-border input-sunken bg-app-input h-[19px] text-center" data-widget="box_segue_level_spin">
          <span data-widget="box_segue_level_unit">dBFS</span>
        </div>
        <div class="flex items-center gap-1">
          <span class="w-[100px] text-right font-bold" data-widget="box_segue_length_label">Segue Length:</span>
          <input type="number" value="0" class="w-[70px] border border-app-border input-sunken bg-app-input h-[19px] text-center" data-widget="box_segue_length_spin">
          <span data-widget="box_segue_length_unit">msec</span>
        </div>
      </div>
      <!-- CartChunk options -->
      <label class="flex items-center gap-1"><input type="checkbox" data-widget="box_use_cartchunk_id_box"> Get cart number from CartChunk CutID</label>
      <label class="flex items-center gap-1"><input type="checkbox" data-widget="box_title_from_cartchunk_id_box"> Get cart title from CartChunk CutID</label>
      <label class="flex items-center gap-1"><input type="checkbox" data-widget="box_fix_broken_formats_box"> Attempt to work around malformatted input files</label>
      <!-- Date offsets -->
      <div class="flex items-center gap-1">
        <span class="w-[120px] text-right font-bold">Offset start date by</span>
        <input type="number" value="0" class="w-[50px] border border-app-border input-sunken bg-app-input h-[19px] text-center" data-widget="box_startoffset_spin">
        <span>days</span>
      </div>
      <div class="flex items-center gap-1">
        <span class="w-[120px] text-right font-bold">Offset end date by</span>
        <input type="number" value="0" class="w-[50px] border border-app-border input-sunken bg-app-input h-[19px] text-center" data-widget="box_endoffset_spin">
        <span>days</span>
      </div>
      <label class="flex items-center gap-1"><input type="checkbox" data-widget="box_create_dates_box"> Create Dates when no Dates Exist</label>
      <div class="ml-6 space-y-0.5">
        <div class="flex items-center gap-1">
          <span class="w-[160px] text-right font-bold" data-widget="box_create_startdate_label">Create start date offset:</span>
          <input type="number" value="0" class="w-[50px] border border-app-border input-sunken bg-app-input h-[19px] text-center" data-widget="box_create_startdate_offset_spin">
          <span data-widget="box_create_startdate_unit">days</span>
        </div>
        <div class="flex items-center gap-1">
          <span class="w-[160px] text-right font-bold" data-widget="box_create_enddate_label">Create end date offset:</span>
          <input type="number" value="0" class="w-[50px] border border-app-border input-sunken bg-app-input h-[19px] text-center" data-widget="box_create_enddate_offset_spin">
          <span data-widget="box_create_enddate_unit">days</span>
        </div>
      </div>
    </div>
    <!-- Bottom buttons -->
    <div class="flex items-center mt-3">
      <button class="bg-app-btn btn-3d rounded-app px-4 py-3 text-app-label w-[80px]" data-widget="reset_button">Reset</button>
      <div class="flex-1"></div>
      <button class="bg-app-btn btn-3d rounded-app px-4 py-3 text-app-label w-[80px] mr-2" data-widget="ok_button">OK</button>
      <button class="bg-app-btn btn-3d rounded-app px-4 py-3 text-app-label w-[80px]" data-widget="cancel_button">Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
