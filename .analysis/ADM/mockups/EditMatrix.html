<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EditMatrix - Edit Switcher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica', 'Arial', system-ui, sans-serif; font-size: 0.875rem; background: #d4d0c8; color: #000; }
  .dialog { width: 420px; margin: 20px auto; background: #d4d0c8; border: 2px outset #d4d0c8; padding: 4px; }
  .titlebar { background: #4a6ea5; color: #fff; font-weight: 700; font-size: 0.875rem; padding: 2px 6px; margin-bottom: 4px; }
  .content { padding: 4px 10px; }
  .form-row { display: flex; align-items: center; margin-bottom: 3px; }
  .form-row label { min-width: 120px; text-align: right; padding-right: 8px; font-size: 0.8125rem; font-weight: 700; }
  .form-row .value { font-size: 0.8125rem; font-weight: 700; }
  input[type="text"], input[type="password"] { border: 2px inset #d4d0c8; background: #fff; padding: 1px 4px; font-size: 0.8125rem; }
  input.wide { width: 240px; }
  input.medium { width: 115px; }
  input.narrow { width: 80px; }
  input.tiny { width: 50px; }
  select { border: 2px inset #d4d0c8; background: #fff; font-size: 0.8125rem; }
  select.port-type { width: 70px; }
  select.serial-port { width: 90px; }
  input[type="number"] { border: 2px inset #d4d0c8; background: #fff; padding: 1px 4px; font-size: 0.8125rem; width: 50px; }
  fieldset { border: 1px solid #000; margin: 6px 0; padding: 6px 10px; }
  legend { font-size: 0.8125rem; font-weight: 700; padding: 0 4px; }
  .connection-grid { display: grid; grid-template-columns: auto auto auto auto; gap: 3px; align-items: center; }
  .connection-grid label { font-size: 0.8125rem; font-weight: 700; text-align: right; padding-right: 4px; }
  .settings-row { display: flex; gap: 10px; align-items: center; margin-bottom: 3px; flex-wrap: wrap; }
  .settings-row label { font-size: 0.8125rem; font-weight: 700; }
  .btn-grid { display: grid; grid-template-columns: repeat(4, 80px); gap: 10px; justify-content: center; margin: 6px 0; }
  .btn-grid2 { display: flex; justify-content: center; margin: 6px 0; }
  button { font-family: inherit; font-size: 0.8125rem; background: #d4d0c8; border: 2px outset #d4d0c8; padding: 4px 8px; cursor: pointer; text-align: center; }
  button:hover { background: #e0dcd4; }
  button:active { border-style: inset; }
  button.config { min-width: 80px; min-height: 50px; font-size: 0.75rem; }
  button.small { min-width: 60px; min-height: 24px; font-size: 0.75rem; }
  button.action { min-width: 80px; min-height: 50px; }
  .button-bar { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
  .cart-row { display: flex; align-items: center; gap: 4px; }
  .disabled { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>
<div class="dialog">
  <div class="titlebar">RDAdmin - Edit Switcher</div>
  <div class="content">
    <!-- Header fields -->
    <div class="form-row"><label>Matrix Number:</label><span class="value">2</span></div>
    <div class="form-row"><label>Switcher Type:</label><span class="value">SAS USI</span></div>
    <div class="form-row"><label>Description:</label><input type="text" class="wide" value="TOC Switcher"></div>

    <!-- Primary Connection -->
    <fieldset>
      <legend>Primary Connection</legend>
      <div class="form-row"><label>Type:</label><select class="port-type"><option>Serial</option><option selected>TCP/IP</option><option>None</option></select>
        <label style="margin-left:20px">Serial Port:</label><select class="serial-port disabled"><option>Serial0</option></select></div>
      <div class="form-row"><label>IP Address:</label><input type="text" class="medium" value="192.168.1.10">
        <label style="margin-left:10px">IP Port:</label><input type="number" value="9600" style="width:65px"></div>
      <div class="form-row"><label>Username:</label><input type="text" class="medium" value="">
        <label style="margin-left:10px">Password:</label><input type="password" class="medium" value=""></div>
      <div class="form-row cart-row"><label>Startup Cart:</label><input type="text" class="narrow" value=""><button class="small">Select</button></div>
      <div class="form-row cart-row"><label>Shutdown Cart:</label><input type="text" class="narrow" value=""><button class="small">Select</button></div>
    </fieldset>

    <!-- Backup Connection -->
    <fieldset>
      <legend>Backup Connection</legend>
      <div class="form-row"><label>Type:</label><select class="port-type"><option>Serial</option><option>TCP/IP</option><option selected>None</option></select>
        <label style="margin-left:20px" class="disabled">Serial Port:</label><select class="serial-port disabled"><option>Serial0</option></select></div>
      <div class="form-row disabled"><label>IP Address:</label><input type="text" class="medium" value="">
        <label style="margin-left:10px">IP Port:</label><input type="number" value="0" style="width:65px"></div>
      <div class="form-row disabled"><label>Username:</label><input type="text" class="medium" value="">
        <label style="margin-left:10px">Password:</label><input type="password" class="medium" value=""></div>
      <div class="form-row cart-row disabled"><label>Startup Cart:</label><input type="text" class="narrow" value=""><button class="small">Select</button></div>
      <div class="form-row cart-row disabled"><label>Shutdown Cart:</label><input type="text" class="narrow" value=""><button class="small">Select</button></div>
    </fieldset>

    <!-- Device Settings -->
    <div class="settings-row">
      <label>Card:</label><input type="number" value="0" style="width:60px">
      <label>Inputs:</label><input type="number" value="8">
      <label>Outputs:</label><input type="number" value="8">
    </div>
    <div class="settings-row">
      <label>Device:</label><input type="text" class="tiny" value="/dev/gpio">
      <label>GPIs:</label><input type="number" value="8">
      <label>GPOs:</label><input type="number" value="8">
    </div>
    <div class="settings-row">
      <label>Layer:</label><select style="width:50px"><option>V</option><option>A</option></select>
      <label>Displays:</label><input type="number" value="0">
    </div>

    <!-- Configure Buttons Row 1 -->
    <div class="btn-grid">
      <button class="config">Configure<br>Inputs</button>
      <button class="config">Configure<br>Outputs</button>
      <button class="config">Configure<br>GPIs</button>
      <button class="config">Configure<br>GPOs</button>
    </div>

    <!-- Configure Buttons Row 2 -->
    <div class="btn-grid">
      <button class="config disabled">LiveWire<br>Nodes</button>
      <button class="config disabled">LiveWire<br>GPIOs</button>
      <button class="config disabled">vGuest<br>Switches</button>
      <button class="config disabled">vGuest<br>Displays</button>
    </div>

    <!-- SAS Row -->
    <div class="btn-grid2">
      <button class="config">SAS<br>Switches</button>
    </div>

    <!-- OK / Cancel -->
    <div class="button-bar">
      <button class="action">OK</button>
      <button class="action">Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
