<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AddStation - Add Host</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    'app-bg':'#d4d0c8','app-panel':'#ffffff','app-input':'#ffffff',
    'app-btn':'#d4d0c8','app-btn-hover':'#e0dcd4','app-titlebar':'#4a6ea5',
    'app-selection':'#0a246a','app-text':'#000000','app-text-sec':'#4a4a4a',
    'app-border':'#808080','app-border-light':'#ffffff','app-border-dark':'#404040'
  }, borderRadius: { 'app':'0px' }, fontSize: { 'app-label':'0.8125rem','app-title':'0.875rem' } } }
}
</script>
<style>
  .qt-btn { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .qt-btn:active { box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #ffffff; }
  .qt-sunken { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
  .qt-input { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; border: none; }
</style>
</head>
<body class="bg-app-bg p-0 m-0 font-['Helvetica','Arial',system-ui,sans-serif] text-app-text text-app-label">
<div class="w-[380px] h-[130px] bg-app-bg border border-app-border" data-widget="AddStation">
  <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-0.5">RDAdmin - Add Host</div>
  <div class="p-2">
    <!-- Host Name -->
    <div class="flex items-center mb-1.5">
      <label class="w-[115px] text-right pr-2 font-bold text-app-label" data-widget="label_name">New Host Name:</label>
      <input type="text" class="qt-input bg-app-input flex-1 h-[19px] px-1 text-app-label" data-widget="add_name_edit" maxlength="64">
    </div>
    <!-- Exemplar -->
    <div class="flex items-center mb-2">
      <label class="w-[115px] text-right pr-2 font-bold text-app-label" data-widget="label_exemplar">Base Host On:</label>
      <select class="qt-sunken bg-app-input flex-1 h-[19px] text-app-label" data-widget="add_exemplar_box">
        <option>Empty Host Config</option>
        <option>frozone</option>
        <option>rdpi</option>
      </select>
    </div>
    <!-- Buttons -->
    <div class="flex justify-end gap-2 mt-1">
      <button class="qt-btn bg-app-btn w-[80px] h-[50px] text-app-label" data-widget="ok_button">&amp;OK</button>
      <button class="qt-btn bg-app-btn w-[80px] h-[50px] text-app-label" data-widget="cancel_button">&amp;Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
