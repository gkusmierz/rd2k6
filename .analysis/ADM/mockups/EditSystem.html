<!DOCTYPE html>
<!-- Source: rdadmin/edit_system.cpp | Class: EditSystem | Screenshot: docs/opsguide/rdadmin.system_wide_settings_dialog.png -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDAdmin - System-Wide Settings</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'app-bg': '#d4d0c8',
        'app-panel': '#ffffff',
        'app-input': '#ffffff',
        'app-btn': '#d4d0c8',
        'app-btn-hover': '#e0dcd4',
        'app-titlebar': '#4a6ea5',
        'app-text': '#000000',
        'app-text-sec': '#4a4a4a',
        'app-border': '#808080',
        'app-border-light': '#ffffff',
        'app-border-dark': '#404040',
      },
      borderRadius: { 'app': '0px' },
      fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' },
    }
  }
}
</script>
<style>
  .qt-btn {
    box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff;
    font-family: 'Helvetica', 'Arial', system-ui, sans-serif;
    font-size: 0.875rem;
  }
  .qt-input {
    box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff;
    font-family: 'Helvetica', 'Arial', system-ui, sans-serif;
    font-size: 0.875rem;
  }
  .qt-checkbox {
    accent-color: #000;
  }
  body { font-family: 'Helvetica', 'Arial', system-ui, sans-serif; font-size: 0.875rem; }
  .form-row { display: flex; align-items: center; margin-bottom: 4px; }
  .form-label { width: 220px; text-align: right; padding-right: 8px; font-size: 0.8125rem; }
</style>
</head>
<body class="bg-app-bg flex items-center justify-center min-h-screen">
  <div class="bg-app-bg border border-app-border" style="width:500px; min-height:306px; position:relative;">
    <!-- Title bar -->
    <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-0.5" style="font-size:0.75rem;">
      RDAdmin - System-Wide Settings
    </div>

    <div class="p-3" style="padding-top:24px;">
      <!-- System Sample Rate -->
      <div class="form-row">
        <label class="form-label">System Sample Rate:</label>
        <select data-widget="edit_sample_rate_box" class="qt-input bg-app-input border border-app-border rounded-app px-1" style="height:22px;">
          <option>32000</option>
          <option selected>44100</option>
          <option>48000</option>
        </select>
        <span class="ml-1 text-app-label">samples/second</span>
      </div>

      <!-- Allow Duplicate Cart Titles -->
      <div class="form-row">
        <label class="form-label">&nbsp;</label>
        <input data-widget="edit_duplicate_carts_box" type="checkbox" checked class="qt-checkbox mr-1">
        <span class="text-app-label">Allow Duplicate Cart Titles</span>
      </div>

      <!-- Auto-Correct Duplicate -->
      <div class="form-row">
        <label class="form-label">&nbsp;</label>
        <input data-widget="edit_fix_duplicate_carts_box" type="checkbox" class="qt-checkbox mr-1" disabled>
        <span class="text-app-label text-app-text-sec">Auto-Correct Duplicate Cart Titles</span>
      </div>

      <!-- Show User List -->
      <div class="form-row">
        <label class="form-label">&nbsp;</label>
        <input data-widget="edit_show_user_list_box" type="checkbox" checked class="qt-checkbox mr-1">
        <span class="text-app-label">Show User List in RDLogin</span>
      </div>

      <!-- ISCI Cross Reference Path -->
      <div class="form-row">
        <label class="form-label">ISCI Cross Reference Path:</label>
        <input data-widget="edit_isci_path_edit" type="text" class="qt-input bg-app-input border border-app-border rounded-app px-1 flex-1" style="height:20px;">
      </div>

      <!-- Origin E-Mail Address -->
      <div class="form-row">
        <label class="form-label">Origin E-Mail Address:</label>
        <input data-widget="edit_origin_email_addr_edit" type="text" class="qt-input bg-app-input border border-app-border rounded-app px-1 flex-1" style="height:20px;" value="Rivendell &lt;noreply@example.com&gt;">
      </div>

      <!-- Multicast Address -->
      <div class="form-row">
        <label class="form-label">Multicast Address for Notifications:</label>
        <input data-widget="edit_notification_address_edit" type="text" class="qt-input bg-app-input border border-app-border rounded-app px-1 flex-1" style="height:20px;" value="239.192.255.72">
      </div>

      <!-- Maximum Remote Post Length -->
      <div class="form-row">
        <label class="form-label">Maximum Remote Post Length:</label>
        <input data-widget="edit_maxpost_spin" type="number" min="1" max="1000" value="1000" class="qt-input bg-app-input border border-app-border rounded-app px-1" style="width:60px; height:22px;">
        <span class="ml-1 text-app-label">Mbytes</span>
      </div>

      <!-- Temporary Cart Group -->
      <div class="form-row">
        <label class="form-label">Temporary Cart Group:</label>
        <select data-widget="edit_temp_cart_group_box" class="qt-input bg-app-input border border-app-border rounded-app px-1" style="height:22px;">
          <option selected>TEMP</option>
          <option>MUSIC</option>
          <option>TRAFFIC</option>
        </select>
      </div>

      <!-- RSS Processor -->
      <div class="form-row">
        <label class="form-label">Process RSS Updates On:</label>
        <select data-widget="edit_rss_processor_box" class="qt-input bg-app-input border border-app-border rounded-app px-1" style="height:22px;">
          <option>[none]</option>
          <option selected>nab1</option>
          <option>station2</option>
        </select>
      </div>
    </div>

    <!-- Bottom buttons -->
    <div style="position:absolute; bottom:10px; left:10px;">
      <button data-widget="edit_encoders_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:90px;height:50px;">Edit Encoder<br>List</button>
    </div>
    <div style="position:absolute; bottom:10px; right:100px;">
      <button data-widget="edit_ok_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:80px;height:50px;">OK</button>
    </div>
    <div style="position:absolute; bottom:10px; right:10px;">
      <button data-widget="edit_cancel_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:80px;height:50px;">Cancel</button>
    </div>
  </div>
</body>
</html>
