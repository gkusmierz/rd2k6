<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EditSvcPerms - RDAdmin - Service Permissions</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwindcss.config = {
  theme: { extend: {
    colors: { 'app-bg':'#d4d0c8','app-panel':'#ffffff','app-input':'#ffffff','app-btn':'#d4d0c8','app-btn-hover':'#e0dcd4','app-titlebar':'#4a6ea5','app-selection':'#0a246a','app-text':'#000000','app-border':'#808080','app-border-light':'#ffffff','app-border-dark':'#404040' },
    borderRadius: { 'app':'0px' },
    fontSize: { 'app-label':'0.8125rem','app-title':'0.875rem' }
  }}
}
</script>
<style>
  .btn-3d { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .input-sunken { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
</style>
</head>
<body class="bg-app-bg font-['Helvetica','Arial',system-ui,sans-serif] text-app-text text-app-label">
<div class="w-[400px] h-[212px] border border-app-border" data-widget="EditSvcPerms" data-window-title="RDAdmin - Service: WXYZ">
  <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-1">RDAdmin - Service: WXYZ</div>
  <div class="p-2">
    <!-- RDListSelector -->
    <div class="flex gap-2" data-widget="svc_host_sel">
      <div class="flex-1">
        <label class="text-app-label font-bold block mb-1">Available Hosts</label>
        <div class="bg-app-panel border-2 border-app-border input-sunken h-[80px] overflow-auto">
          <div class="px-2 py-0.5">station-02</div>
          <div class="px-2 py-0.5">station-03</div>
        </div>
      </div>
      <div class="flex flex-col justify-center gap-1">
        <button class="bg-app-btn btn-3d px-2 py-1 text-xs">&gt;&gt;</button>
        <button class="bg-app-btn btn-3d px-2 py-1 text-xs">&lt;&lt;</button>
      </div>
      <div class="flex-1">
        <label class="text-app-label font-bold block mb-1">Enabled Hosts</label>
        <div class="bg-app-panel border-2 border-app-border input-sunken h-[80px] overflow-auto">
          <div class="px-2 py-0.5 bg-app-selection text-white">station-01</div>
        </div>
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-2">
      <button class="bg-app-btn btn-3d rounded-app px-4 py-3 text-app-label w-[80px]" data-widget="ok_button">OK</button>
      <button class="bg-app-btn btn-3d rounded-app px-4 py-3 text-app-label w-[80px]" data-widget="cancel_button">Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
