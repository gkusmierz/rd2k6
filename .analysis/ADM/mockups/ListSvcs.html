<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ListSvcs - RDAdmin - Services</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwindcss.config = {
  theme: { extend: {
    colors: { 'app-bg':'#d4d0c8','app-panel':'#ffffff','app-input':'#ffffff','app-btn':'#d4d0c8','app-btn-hover':'#e0dcd4','app-titlebar':'#4a6ea5','app-selection':'#0a246a','app-text':'#000000','app-text-sec':'#4a4a4a','app-border':'#808080','app-border-light':'#ffffff','app-border-dark':'#404040','app-accent':'#0a246a','app-error':'#cc0000' },
    borderRadius: { 'app':'0px' },
    fontSize: { 'app-label':'0.8125rem','app-title':'0.875rem' }
  }}
}
</script>
<style>
  .btn-3d { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .btn-3d:active { box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #ffffff; }
  .input-sunken { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
</style>
</head>
<body class="bg-app-bg font-['Helvetica','Arial',system-ui,sans-serif] text-app-text text-app-title p-0 m-0">
<div class="w-[500px] min-h-[300px] border border-app-border" data-widget="ListSvcs" data-window-title="RDAdmin - Services">
  <!-- Title bar -->
  <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-1">RDAdmin - Services</div>
  <div class="p-3 flex gap-2 h-[270px]">
    <!-- Left: list -->
    <div class="flex-1 flex flex-col">
      <label class="text-app-label font-bold mb-1" data-widget="list_title_label">Services:</label>
      <div class="flex-1 bg-app-panel border-2 border-app-border input-sunken overflow-auto" data-widget="list_box">
        <div class="px-2 py-0.5 text-app-label">CHUM</div>
        <div class="px-2 py-0.5 text-app-label">Production</div>
        <div class="px-2 py-0.5 text-app-label">REL-FAIL</div>
        <div class="px-2 py-0.5 text-app-label">REL-PASS</div>
        <div class="px-2 py-0.5 text-app-label">TEST</div>
        <div class="px-2 py-0.5 text-app-label">TIME-FAIL</div>
        <div class="px-2 py-0.5 text-app-label">TIME-PASS</div>
        <div class="px-2 py-0.5 text-app-label bg-app-selection text-white">WXYZ</div>
      </div>
    </div>
    <!-- Right: buttons -->
    <div class="flex flex-col gap-2 w-[80px]">
      <button class="bg-app-btn btn-3d rounded-app px-2 py-3 text-app-label mt-4" data-widget="list_add_button">Add</button>
      <button class="bg-app-btn btn-3d rounded-app px-2 py-3 text-app-label" data-widget="list_edit_button">Edit</button>
      <button class="bg-app-btn btn-3d rounded-app px-2 py-3 text-app-label" data-widget="list_delete_button">Delete</button>
      <div class="flex-1"></div>
      <button class="bg-app-btn btn-3d rounded-app px-2 py-3 text-app-label" data-widget="list_close_button">Close</button>
    </div>
  </div>
</div>
</body>
</html>
