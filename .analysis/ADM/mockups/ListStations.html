<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ListStations - Rivendell Host List</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    'app-bg':'#d4d0c8','app-panel':'#ffffff','app-input':'#ffffff',
    'app-btn':'#d4d0c8','app-btn-hover':'#e0dcd4','app-titlebar':'#4a6ea5',
    'app-selection':'#0a246a','app-text':'#000000','app-text-sec':'#4a4a4a',
    'app-border':'#808080','app-border-light':'#ffffff','app-border-dark':'#404040',
    'app-accent':'#0a246a','app-error':'#cc0000'
  }, borderRadius: { 'app':'0px' }, fontSize: { 'app-label':'0.8125rem','app-title':'0.875rem' } } }
}
</script>
<style>
  .qt-btn { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .qt-btn:active { box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #ffffff; }
  .qt-sunken { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
</style>
</head>
<body class="bg-app-bg p-0 m-0 font-['Helvetica','Arial',system-ui,sans-serif] text-app-text text-app-label">
<div class="w-[500px] h-[300px] bg-app-bg border border-app-border relative" data-widget="ListStations">
  <!-- Title bar -->
  <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-0.5">RDAdmin - Rivendell Host List</div>

  <div class="p-2 h-[calc(100%-24px)] relative">
    <!-- Label -->
    <label class="text-app-label font-normal absolute top-2 left-3" data-widget="list_box_label">Ho&shy;sts:</label>

    <!-- List box -->
    <div class="qt-sunken bg-app-panel absolute top-7 left-2 right-[100px] bottom-2 overflow-auto" data-widget="list_box">
      <div class="px-1 py-0.5">frozone</div>
      <div class="px-1 py-0.5 bg-app-selection text-white">rdpi</div>
    </div>

    <!-- Buttons column -->
    <div class="absolute right-2 top-6 flex flex-col gap-2">
      <button class="qt-btn bg-app-btn w-[80px] h-[50px] text-app-label" data-widget="list_add_button">&amp;Add</button>
      <button class="qt-btn bg-app-btn w-[80px] h-[50px] text-app-label" data-widget="list_edit_button">&amp;Edit</button>
      <button class="qt-btn bg-app-btn w-[80px] h-[50px] text-app-label" data-widget="list_delete_button">&amp;Delete</button>
    </div>
    <button class="qt-btn bg-app-btn w-[80px] h-[50px] text-app-label absolute right-2 bottom-2" data-widget="list_close_button">&amp;Close</button>
  </div>
</div>
</body>
</html>
