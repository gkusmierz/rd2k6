<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ListNodes – Livewire Node List</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 0.875rem; background: #d4d0c8; color: #000; }
  .window { width: 400px; margin: 20px auto; background: #d4d0c8; border: 2px outset #d4d0c8; }
  .titlebar { background: #4a6ea5; color: #fff; padding: 3px 6px; font-weight: 700; font-size: 0.875rem; }
  .content { padding: 10px; }
  table.list { width: 100%; border-collapse: collapse; background: #fff; border: 2px inset #d4d0c8; margin-bottom: 10px; }
  table.list th { background: #d4d0c8; border: 1px solid #808080; padding: 2px 5px; font-size: 0.8125rem; text-align: left; }
  table.list td { border: 1px solid #e0e0e0; padding: 2px 5px; font-size: 0.8125rem; }
  table.list tr.selected { background: #0a246a; color: #fff; }
  .button-bar { display: flex; gap: 10px; }
  .button-bar .spacer { flex: 1; }
  button { font-family: Helvetica, Arial, sans-serif; font-size: 0.8125rem; padding: 4px 16px; min-width: 80px; min-height: 50px; background: #d4d0c8; border: 2px outset #d4d0c8; cursor: pointer; }
  button:active { border-style: inset; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">RDAdmin - Livewire Node List</div>
  <div class="content">
    <table class="list" style="height:160px;">
      <thead><tr><th>HOSTNAME</th><th>DESCRIPTION</th><th>FIRST OUTPUT</th><th style="text-align:center;">TCP PORT</th></tr></thead>
      <tbody>
        <tr class="selected"><td>192.168.1.10</td><td>Studio A Node</td><td>1</td><td style="text-align:center;">93</td></tr>
        <tr><td>192.168.1.11</td><td>Studio B Node</td><td>[none]</td><td style="text-align:center;">93</td></tr>
      </tbody>
    </table>
    <div class="button-bar">
      <button>&amp;Add</button>
      <button>&amp;Edit</button>
      <button>&amp;Delete</button>
      <span class="spacer"></span>
      <button>&amp;Close</button>
    </div>
  </div>
</div>
</body>
</html>
