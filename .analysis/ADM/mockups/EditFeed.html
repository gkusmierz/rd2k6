<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EditFeed – Feed Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 0.875rem; background: #d4d0c8; color: #000; }
  .window { width: 1000px; margin: 20px auto; background: #d4d0c8; border: 2px outset #d4d0c8; }
  .titlebar { background: #4a6ea5; color: #fff; padding: 3px 6px; font-weight: 700; font-size: 0.875rem; }
  .content { padding: 10px; display: flex; gap: 10px; }
  .left { width: 500px; }
  .right { flex: 1; }
  .top-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  fieldset { border: 1px solid #a0a0a0; padding: 8px; margin-bottom: 8px; }
  legend { font-size: 0.8125rem; font-weight: 700; padding: 0 4px; }
  .form-row { display: flex; align-items: center; margin-bottom: 2px; }
  label { font-size: 0.8125rem; text-align: right; padding-right: 4px; min-width: 90px; }
  label.wide { min-width: 130px; }
  input[type=text], input[type=password] { font-size: 0.8125rem; border: 2px inset #d4d0c8; padding: 1px 4px; background: #fff; flex: 1; }
  input.short { flex: none; width: 60px; }
  input.med { flex: none; width: 90px; }
  input.ro { background: #eee; }
  select { font-size: 0.8125rem; border: 2px inset #d4d0c8; padding: 1px; background: #fff; }
  textarea { font-size: 0.8125rem; border: 2px inset #d4d0c8; padding: 2px 4px; background: #fff; width: 100%; resize: none; }
  input[type=checkbox] { margin-right: 4px; }
  .check-row { display: flex; align-items: center; margin-bottom: 2px; margin-left: 105px; }
  .check-label { font-size: 0.8125rem; }
  button { font-family: Helvetica, Arial, sans-serif; font-size: 0.8125rem; padding: 4px 8px; background: #d4d0c8; border: 2px outset #d4d0c8; cursor: pointer; }
  button.big { min-width: 80px; min-height: 50px; }
  button.small { min-height: 24px; min-width: 40px; font-size: 0.6875rem; }
  button.med { min-height: 38px; min-width: 100px; }
  .section-label { font-size: 0.8125rem; font-weight: 700; margin: 4px 0 2px; }
  .button-bar { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
  .unit { font-size: 0.8125rem; margin-left: 4px; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">RDAdmin - Feed: MYPOD</div>
  <div class="content">
    <div class="left">
      <!-- Top bar -->
      <div class="top-bar">
        <label style="min-width:auto;">Is Superfeed:</label>
        <select style="width:60px;"><option selected>No</option><option>Yes</option></select>
        <button class="med">Select Member<br>Feeds</button>
        <button class="med">Manage<br>Images</button>
      </div>

      <!-- Channel Values -->
      <fieldset>
        <legend>Channel Values</legend>
        <div class="form-row"><label>Title:</label><input type="text" value="My Podcast"></div>
        <div class="form-row"><label>Category:</label><select style="flex:1;"><option>Technology</option></select></div>
        <div class="form-row"><label>Link:</label><input type="text" value="https://example.com"></div>
        <div class="form-row"><label>Copyright:</label><input type="text" value="2025 Example Corp"></div>
        <div class="form-row"><label>Editor:</label><input type="text" value="editor@example.com"></div>
        <div class="form-row"><label>Author:</label><input type="text" value="John Doe"></div>
        <div class="check-row"><input type="checkbox"><span class="check-label">Use as default Item Author</span></div>
        <div class="form-row"><label>Owner Name:</label><input type="text" value="Example Corp"></div>
        <div class="form-row"><label>Owner E-Mail:</label><input type="text" value="owner@example.com"></div>
        <div class="form-row"><label>Webmaster:</label><input type="text" value="web@example.com"></div>
        <div class="form-row"><label>Language:</label><input type="text" class="short" value="en-us"></div>
        <div class="check-row" style="margin-left:190px;"><input type="checkbox"><span class="check-label">Channel contains explicit content</span></div>
        <div class="form-row" style="align-items:flex-start;"><label style="padding-top:2px;">Description:</label><textarea rows="4">A great podcast about technology.</textarea></div>
        <div class="form-row"><label>Image:</label><select style="flex:1;"><option>podcast_cover.jpg</option></select></div>
      </fieldset>

      <!-- Upload / Audio -->
      <div class="form-row"><label class="wide">Upload URL:</label><input type="text" value="sftp://example.com/podcasts"></div>
      <div class="form-row">
        <label class="wide" style="min-width:180px;">Username:</label><input type="text" class="med" value="user">
        <label style="min-width:70px;">Password:</label><input type="password" class="med" value="****">
      </div>
      <div class="check-row" style="margin-left:150px;"><input type="checkbox"><span class="check-label">Authenticate with local identity file</span></div>
      <div class="form-row"><label class="wide">Audio Format:</label><input type="text" class="ro" value="MPEG Layer 3, 128 kbps" readonly style="flex:1;"><button class="small" style="margin-left:4px;">Set</button></div>
      <div class="check-row" style="margin-left:150px;"><input type="checkbox" checked><span class="check-label">Normalize</span><label style="min-width:45px;margin-left:20px;">Level:</label><input type="text" class="short" value="-13"><span class="unit">dBFS</span></div>
      <div class="form-row"><label class="wide">Audio Extension:</label><input type="text" class="short" value="mp3"></div>
      <div class="form-row"><label class="wide">Download URL:</label><input type="text" value="https://example.com/podcasts"></div>
      <div class="form-row"><label class="wide">Enable AutoPost:</label><select style="width:60px;"><option>No</option><option selected>Yes</option></select></div>
      <div class="form-row"><label class="wide">Default Shelf Life:</label><input type="text" class="med" value="30"><span class="unit">days</span></div>
      <div class="form-row"><label class="wide">Default Item Image:</label><select style="flex:1;"><option>episode_default.jpg</option></select></div>
      <div class="form-row"><label class="wide">Enclosure Preamble:</label><input type="text" value=""></div>
      <div class="form-row"><label class="wide">Episode Sort Order:</label><select style="width:100px;"><option selected>Descending</option><option>Ascending</option></select></div>
    </div>

    <div class="right">
      <div class="form-row"><label style="min-width:90px;">RSS Schema:</label><select style="width:200px;"><option>Apple iTunes</option><option>Custom</option></select></div>
      <div class="section-label" style="display:flex;align-items:center;gap:6px;">Header XML: <button class="small">Copy to Clipboard</button></div>
      <textarea rows="4" style="margin-bottom:6px;">&lt;?xml version="1.0"?&gt;</textarea>
      <div class="section-label" style="display:flex;align-items:center;gap:6px;">Channel XML: <button class="small">Copy to Clipboard</button></div>
      <textarea rows="14" style="margin-bottom:6px;">&lt;channel&gt;...&lt;/channel&gt;</textarea>
      <div class="section-label" style="display:flex;align-items:center;gap:6px;">Item XML: <button class="small">Copy to Clipboard</button></div>
      <textarea rows="13">&lt;item&gt;...&lt;/item&gt;</textarea>
    </div>
  </div>

  <div class="button-bar" style="padding:0 10px 10px;">
    <button class="big">&amp;OK</button>
    <button class="big">&amp;Cancel</button>
  </div>
</div>
</body>
</html>
