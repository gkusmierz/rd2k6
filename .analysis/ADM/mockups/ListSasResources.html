<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ListSasResources - SAS Switches</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica', 'Arial', system-ui, sans-serif; font-size: 0.875rem; background: #d4d0c8; color: #000; }
  .dialog { width: 400px; min-height: 250px; margin: 20px auto; background: #d4d0c8; border: 2px outset #d4d0c8; padding: 4px; }
  .titlebar { background: #4a6ea5; color: #fff; font-weight: 700; font-size: 0.875rem; padding: 2px 6px; margin-bottom: 4px; }
  .content { padding: 4px 10px; }
  label.section { font-size: 0.8125rem; font-weight: 700; display: block; margin-bottom: 2px; }
  .listview { width: 100%; border: 2px inset #d4d0c8; background: #fff; margin-bottom: 8px; min-height: 160px; }
  .listview table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
  .listview th { background: #d4d0c8; border: 1px outset #d4d0c8; text-align: center; padding: 2px 5px; font-weight: 700; }
  .listview td { padding: 2px 5px; border-bottom: 1px solid #e0e0e0; text-align: center; }
  .listview tr.selected { background: #0a246a; color: #fff; }
  .button-bar { display: flex; gap: 10px; }
  .button-bar .spacer { flex: 1; }
  button { font-family: inherit; font-size: 0.875rem; background: #d4d0c8; border: 2px outset #d4d0c8; padding: 4px 16px; min-width: 80px; min-height: 50px; cursor: pointer; }
  button:hover { background: #e0dcd4; }
  button:active { border-style: inset; }
</style>
</head>
<body>
<div class="dialog">
  <div class="titlebar">RDAdmin - SAS Switches</div>
  <div class="content">
    <label class="section">SAS Switches</label>
    <div class="listview">
      <table>
        <thead><tr><th>GPIO Line</th><th>Console</th><th>Source</th><th>Opto/Relay</th></tr></thead>
        <tbody>
          <tr><td>001</td><td>1</td><td>5</td><td>2</td></tr>
          <tr class="selected"><td>002</td><td>1</td><td>8</td><td>3</td></tr>
          <tr><td>003</td><td></td><td></td><td></td></tr>
          <tr><td>004</td><td></td><td></td><td></td></tr>
          <tr><td>005</td><td></td><td></td><td></td></tr>
          <tr><td>006</td><td></td><td></td><td></td></tr>
          <tr><td>007</td><td></td><td></td><td></td></tr>
          <tr><td>008</td><td></td><td></td><td></td></tr>
        </tbody>
      </table>
    </div>
    <div class="button-bar">
      <button>Edit</button>
      <span class="spacer"></span>
      <button>OK</button>
      <button>Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
