<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EditJack - JACK Configuration</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    'app-bg':'#d4d0c8','app-panel':'#ffffff','app-input':'#ffffff',
    'app-btn':'#d4d0c8','app-btn-hover':'#e0dcd4','app-titlebar':'#4a6ea5',
    'app-selection':'#0a246a','app-text':'#000000','app-border':'#808080','app-border-light':'#ffffff','app-border-dark':'#404040'
  }, borderRadius: { 'app':'0px' }, fontSize: { 'app-label':'0.8125rem','app-title':'0.875rem' } } }
}
</script>
<style>
  .qt-btn { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .qt-sunken { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
  .qt-input { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; border: none; background: #fff; }
  .list-header { display: flex; background: #d4d0c8; border-bottom: 1px solid #808080; font-weight: 700; font-size: 0.8125rem; }
  .list-row { display: flex; font-size: 0.8125rem; padding: 1px 4px; }
  .list-row.selected { background: #0a246a; color: #fff; }
</style>
</head>
<body class="bg-app-bg p-0 m-0 font-['Helvetica','Arial',system-ui,sans-serif] text-app-text text-app-label">
<div class="w-[450px] h-[352px] bg-app-bg border border-app-border" data-widget="EditJack">
  <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-0.5">RDAdmin - JACK Configuration for gazerbeam</div>
  <div class="p-2">
    <!-- Start JACK -->
    <div class="flex items-center gap-1 mb-1">
      <input type="checkbox" checked data-widget="edit_start_jack_box">
      <label class="font-bold text-app-label" data-widget="edit_start_jack_label">Start JACK Server</label>
    </div>

    <!-- Server Name -->
    <div class="flex items-center gap-1 mb-1">
      <label class="font-bold text-app-label w-[130px] text-right">JACK Server Name:</label>
      <input type="text" class="qt-input flex-1 h-[20px]" data-widget="edit_jack_server_name_edit">
    </div>

    <!-- Command Line -->
    <div class="flex items-center gap-1 mb-1">
      <label class="font-bold text-app-label w-[130px] text-right">JACK Command Line:</label>
      <input type="text" class="qt-input flex-1 h-[20px]" data-widget="edit_jack_command_line_edit" value="jackd -R -d alsa -d hw:0 -r 48000">
    </div>

    <!-- Audio Ports -->
    <div class="flex items-center gap-1 mb-2">
      <label class="font-bold text-app-label w-[130px] text-right">Active Audio Ports:</label>
      <input type="number" class="qt-input w-[50px] h-[20px]" data-widget="edit_jack_audio_ports_spin" value="8">
    </div>

    <!-- Client list -->
    <label class="font-bold text-app-label" data-widget="edit_jack_client_label">JACK Clients to Start:</label>
    <div class="qt-sunken bg-app-panel w-full h-[120px] overflow-auto mt-1" data-widget="edit_jack_client_view">
      <div class="list-header">
        <span class="w-[120px] px-1">Client</span>
        <span class="flex-1 px-1">Command Line</span>
      </div>
      <div class="list-row selected">
        <span class="w-[120px]">Stream Encoder</span>
        <span class="flex-1 truncate">glasscoder --server-type=hls --server-url=http://localhost/hls</span>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="flex gap-1 mt-2">
      <button class="qt-btn bg-app-btn w-[50px] h-[30px] text-xs" data-widget="edit_add_button">&amp;Add</button>
      <button class="qt-btn bg-app-btn w-[50px] h-[30px] text-xs" data-widget="edit_edit_button">&amp;Edit</button>
      <button class="qt-btn bg-app-btn w-[50px] h-[30px] text-xs" data-widget="edit_delete_button">&amp;Delete</button>
      <div class="flex-1"></div>
      <button class="qt-btn bg-app-btn w-[80px] h-[50px]" data-widget="edit_ok_button">&amp;OK</button>
      <button class="qt-btn bg-app-btn w-[80px] h-[50px]" data-widget="edit_cancel_button">&amp;Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
