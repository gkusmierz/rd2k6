<!DOCTYPE html>
<!-- Source: rdadmin/edit_schedcodes.cpp | Class: EditSchedCode | Screenshot: docs/opsguide/rdadmin.scheduler_code_dialog.png -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDAdmin - Scheduler Code: WCR-E</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'app-bg': '#d4d0c8',
        'app-panel': '#ffffff',
        'app-input': '#ffffff',
        'app-btn': '#d4d0c8',
        'app-btn-hover': '#e0dcd4',
        'app-titlebar': '#4a6ea5',
        'app-text': '#000000',
        'app-border': '#808080',
        'app-border-light': '#ffffff',
        'app-border-dark': '#404040',
      },
      borderRadius: { 'app': '0px' },
      fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' },
    }
  }
}
</script>
<style>
  .qt-btn {
    box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff;
    font-family: 'Helvetica', 'Arial', system-ui, sans-serif;
    font-size: 0.875rem;
  }
  .qt-input {
    box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff;
    font-family: 'Helvetica', 'Arial', system-ui, sans-serif;
    font-size: 0.875rem;
  }
  body { font-family: 'Helvetica', 'Arial', system-ui, sans-serif; }
</style>
</head>
<body class="bg-app-bg flex items-center justify-center min-h-screen">
  <div class="bg-app-bg border border-app-border" style="width:400px; height:140px; position:relative;">
    <!-- Title bar -->
    <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-0.5" style="font-size:0.75rem;">
      Scheduler Code: WCR-E
    </div>

    <!-- Scheduler Code (read-only) -->
    <div style="position:absolute; top:28px; left:10px;" class="flex items-center">
      <label class="text-app-label text-right" style="width:110px;">Scheduler Code:</label>
      <input data-widget="schedcode_name_edit" type="text" readonly value="WCR-E" class="qt-input bg-app-input border border-app-border rounded-app px-1 ml-1" style="width:100px; height:19px; background:#e8e8e0;">
    </div>

    <!-- Code Description -->
    <div style="position:absolute; top:49px; left:10px;" class="flex items-center">
      <label class="text-app-label text-right" style="width:110px;">Code Description:</label>
      <input data-widget="schedcode_description_edit" type="text" maxlength="255" value="The Beatles" class="qt-input bg-app-input border border-app-border rounded-app px-1 ml-1" style="width:265px; height:19px;">
    </div>

    <!-- Buttons -->
    <div style="position:absolute; bottom:10px; right:10px; display:flex; gap:8px;">
      <button data-widget="ok_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:80px;height:40px;">OK</button>
      <button data-widget="cancel_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:80px;height:40px;">Cancel</button>
    </div>
  </div>
</body>
</html>
