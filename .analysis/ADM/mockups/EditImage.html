<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EditImage – Image Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 0.875rem; background: #d4d0c8; color: #000; }
  .window { width: 600px; margin: 20px auto; background: #d4d0c8; border: 2px outset #d4d0c8; }
  .titlebar { background: #4a6ea5; color: #fff; padding: 3px 6px; font-weight: 700; font-size: 0.875rem; }
  .content { padding: 10px; }
  .image-preview { width: 580px; height: 580px; background: #e0e0e0; border: 1px solid #999; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
  .image-preview span { color: #666; font-size: 1.5rem; }
  .form-row { display: flex; align-items: center; margin-bottom: 2px; }
  label { font-size: 0.8125rem; text-align: right; padding-right: 4px; min-width: 120px; font-weight: 700; }
  input[type=text] { font-size: 0.8125rem; border: 2px inset #d4d0c8; padding: 1px 4px; background: #fff; flex: 1; }
  input.ro { background: #eee; }
  .info-row { display: flex; align-items: center; margin-bottom: 2px; gap: 20px; margin-left: 130px; }
  .info-label { font-size: 0.8125rem; font-weight: 700; }
  .info-value { font-size: 0.8125rem; }
  .button-bar { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
  button { font-family: Helvetica, Arial, sans-serif; font-size: 0.8125rem; padding: 4px 16px; min-width: 80px; min-height: 50px; background: #d4d0c8; border: 2px outset #d4d0c8; cursor: pointer; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">RDAdmin - Image Viewer</div>
  <div class="content">
    <div class="image-preview"><span>[Image Preview]</span></div>
    <div class="form-row">
      <label>Description:</label>
      <input type="text" value="Podcast Cover Art">
    </div>
    <div class="form-row">
      <label>URL:</label>
      <input type="text" class="ro" value="https://example.com/feeds/img_1_42.jpg" readonly>
    </div>
    <div class="info-row">
      <span><span class="info-label">Native Size:</span> <span class="info-value">1400x1400</span></span>
      <span><span class="info-label">Type:</span> <span class="info-value">JPG</span></span>
    </div>
    <div class="button-bar">
      <button>OK</button>
      <button>Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
