<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ListReplicatorCarts - RDAdmin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'app-bg': '#d4d0c8',
        'app-btn': '#d4d0c8',
        'app-text': '#000000',
        'app-border': '#808080',
        'app-selection': '#0a246a',
      },
      borderRadius: { 'app': '0px' },
      fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' }
    }
  }
}
</script>
<style>
  .qt-btn { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .qt-btn:active { box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #ffffff; }
  .qt-listview { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
  .qt-header { background: #d4d0c8; border-bottom: 1px solid #808080; font-weight: bold; font-size: 0.75rem; }
</style>
</head>
<body class="bg-app-bg flex items-start justify-center pt-8" style="font-family: Helvetica, Arial, system-ui, sans-serif;">

<div class="bg-app-bg border border-app-border" style="width:500px; height:400px; position:relative;">
  <!-- Title bar -->
  <div class="bg-[#4a6ea5] text-white text-app-title font-bold px-2 py-1">
    XDS Replicator Carts
  </div>

  <div class="p-3">
    <!-- Label -->
    <label class="text-app-label font-normal text-app-text block mb-1">Active Carts:</label>

    <!-- List view -->
    <div class="qt-listview bg-white border border-app-border" style="position:absolute; left:10px; top:55px; right:120px; bottom:15px; overflow:auto;">
      <!-- Header -->
      <div class="qt-header flex text-xs px-1 py-0.5">
        <div style="width:24px"></div>
        <div style="width:70px">CART</div>
        <div style="width:140px">TITLE</div>
        <div style="width:110px">LAST POSTED</div>
        <div style="width:120px">POSTED FILENAME</div>
      </div>
      <!-- Sample rows -->
      <div class="flex text-xs px-1 py-0.5 bg-app-selection text-white">
        <div style="width:24px">&#9654;</div>
        <div style="width:70px">000101</div>
        <div style="width:140px">Station ID</div>
        <div style="width:110px">14:30:00 01/04/2026</div>
        <div style="width:120px">000101.wav</div>
      </div>
      <div class="flex text-xs px-1 py-0.5">
        <div style="width:24px">&#9654;</div>
        <div style="width:70px">000205</div>
        <div style="width:140px">Promo Spot A</div>
        <div style="width:110px">12:00:00 01/04/2026</div>
        <div style="width:120px">000205.wav</div>
      </div>
    </div>

    <!-- Buttons -->
    <div style="position:absolute; right:10px; top:55px; width:80px;">
      <button class="qt-btn bg-app-btn text-app-text text-app-label w-full py-3 mb-2 rounded-app border border-app-border">Repost</button>
      <button class="qt-btn bg-app-btn text-app-text text-app-label w-full py-3 mb-2 rounded-app border border-app-border leading-tight">Repost<br>All</button>
    </div>

    <!-- Close -->
    <div style="position:absolute; right:10px; bottom:15px; width:80px;">
      <button class="qt-btn bg-app-btn text-app-text text-app-label w-full py-3 rounded-app border border-app-border font-bold">Close</button>
    </div>
  </div>
</div>

</body>
</html>
