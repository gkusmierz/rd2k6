<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ListDropboxes - Rivendell Dropbox Configurations</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwindcss.config = {
  theme: { extend: {
    colors: { 'app-bg':'#d4d0c8','app-panel':'#ffffff','app-input':'#ffffff','app-btn':'#d4d0c8','app-btn-hover':'#e0dcd4','app-titlebar':'#4a6ea5','app-selection':'#0a246a','app-text':'#000000','app-border':'#808080','app-border-light':'#ffffff','app-border-dark':'#404040' },
    borderRadius: { 'app':'0px' },
    fontSize: { 'app-label':'0.8125rem','app-title':'0.875rem' }
  }}
}
</script>
<style>
  .btn-3d { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .input-sunken { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
</style>
</head>
<body class="bg-app-bg font-['Helvetica','Arial',system-ui,sans-serif] text-app-text text-app-label">
<div class="w-[640px] min-h-[420px] border border-app-border" data-widget="ListDropboxes" data-window-title="RDAdmin - Rivendell Dropbox Configurations on elastigirl">
  <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-1">RDAdmin - Rivendell Dropbox Configurations on elastigirl</div>
  <div class="p-2 flex gap-2 h-[390px]">
    <!-- List view -->
    <div class="flex-1 bg-app-panel border-2 border-app-border input-sunken overflow-auto" data-widget="list_dropboxes_view">
      <table class="w-full text-[0.75rem]">
        <thead class="bg-app-bg sticky top-0">
          <tr>
            <th class="text-right px-1 py-0.5 border-r border-app-border">ID</th>
            <th class="text-left px-1 py-0.5 border-r border-app-border">Group</th>
            <th class="text-left px-1 py-0.5 border-r border-app-border">Path</th>
            <th class="text-center px-1 py-0.5 border-r border-app-border">Norm Level</th>
            <th class="text-center px-1 py-0.5 border-r border-app-border">Autotrim</th>
            <th class="text-center px-1 py-0.5 border-r border-app-border">To Cart</th>
            <th class="text-center px-1 py-0.5">Use CartChunk</th>
          </tr>
        </thead>
        <tbody>
          <tr class="bg-app-selection text-white">
            <td class="text-right px-1">16</td>
            <td class="text-left px-1 font-bold">BEDS</td>
            <td class="text-left px-1">/home/fredg/dropbox/*</td>
            <td class="text-center px-1">[off]</td>
            <td class="text-center px-1">[off]</td>
            <td class="text-center px-1">[auto]</td>
            <td class="text-center px-1">No</td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- Right: buttons -->
    <div class="flex flex-col gap-2 w-[80px]">
      <button class="bg-app-btn btn-3d rounded-app px-2 py-3 text-app-label" data-widget="list_add_button">Add</button>
      <button class="bg-app-btn btn-3d rounded-app px-2 py-3 text-app-label" data-widget="list_edit_button">Edit</button>
      <button class="bg-app-btn btn-3d rounded-app px-2 py-3 text-app-label" data-widget="list_duplicate_button">Duplicate</button>
      <button class="bg-app-btn btn-3d rounded-app px-2 py-3 text-app-label" data-widget="list_delete_button">Delete</button>
      <div class="flex-1"></div>
      <button class="bg-app-btn btn-3d rounded-app px-2 py-3 text-app-label" data-widget="list_close_button">Close</button>
    </div>
  </div>
</div>
</body>
</html>
