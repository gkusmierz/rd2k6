<!DOCTYPE html>
<!-- Source: rdadmin/list_encoders.cpp | Class: ListEncoders | Screenshot: docs/opsguide/rdadmin.encoder_profiles_dialog.png -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDAdmin - Encoder Profiles</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'app-bg': '#d4d0c8',
        'app-panel': '#ffffff',
        'app-input': '#ffffff',
        'app-btn': '#d4d0c8',
        'app-btn-hover': '#e0dcd4',
        'app-titlebar': '#4a6ea5',
        'app-text': '#000000',
        'app-border': '#808080',
        'app-border-light': '#ffffff',
        'app-border-dark': '#404040',
      },
      borderRadius: { 'app': '0px' },
      fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' },
    }
  }
}
</script>
<style>
  .qt-btn {
    box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff;
    font-family: 'Helvetica', 'Arial', system-ui, sans-serif;
    font-size: 0.875rem;
  }
  .qt-list {
    box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff;
  }
  body { font-family: 'Helvetica', 'Arial', system-ui, sans-serif; }
  .list-header { background: #d4d0c8; border-bottom: 1px solid #808080; padding: 2px 5px; font-weight: bold; font-size: 0.8125rem; }
  .list-item { padding: 3px 5px; font-size: 0.8125rem; border-bottom: 1px solid #e0e0e0; }
  .list-item:hover { background: #0a246a; color: #fff; }
</style>
</head>
<body class="bg-app-bg flex items-center justify-center min-h-screen">
  <div class="bg-app-bg border border-app-border" style="width:400px; height:300px; position:relative;">
    <!-- Title bar -->
    <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-0.5" style="font-size:0.75rem;">
      RDAdmin - Encoder Profiles
    </div>

    <!-- List label -->
    <div style="position:absolute; top:24px; left:10px;" class="font-bold text-app-title" data-widget="c_list_label">
      Encoder Profiles
    </div>

    <!-- List view -->
    <div data-widget="c_list" class="qt-list bg-app-input border border-app-border overflow-auto" style="position:absolute; top:44px; left:10px; right:10px; bottom:60px;">
      <div class="list-header">Name</div>
      <div class="list-item">128 kbps MP3 [Higher quality, larger size]</div>
      <div class="list-item">32 kbps MP3 [Small size, lower quality]</div>
      <div class="list-item">PCM WAV [Highest quality, very large file size]</div>
    </div>

    <!-- Buttons -->
    <div style="position:absolute; bottom:10px; left:10px; display:flex; gap:8px;">
      <button data-widget="c_add_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:80px;height:40px;">Add</button>
      <button data-widget="c_edit_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:80px;height:40px;">Edit</button>
      <button data-widget="c_delete_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:80px;height:40px;">Delete</button>
      <button data-widget="c_close_button" class="qt-btn bg-app-btn hover:bg-app-btn-hover border-0 rounded-app text-app-text" style="width:80px;height:40px;">Close</button>
    </div>
  </div>
</body>
</html>
