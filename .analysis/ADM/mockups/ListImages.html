<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ListImages – Image Manager</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 0.875rem; background: #d4d0c8; color: #000; }
  .window { width: 400px; margin: 20px auto; background: #d4d0c8; border: 2px outset #d4d0c8; }
  .titlebar { background: #4a6ea5; color: #fff; padding: 3px 6px; font-weight: 700; font-size: 0.875rem; }
  .content { padding: 10px; }
  .image-list { width: 100%; height: 220px; border: 2px inset #d4d0c8; background: #fff; overflow-y: auto; margin-bottom: 10px; }
  .image-item { display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-bottom: 1px solid #eee; cursor: pointer; }
  .image-item.selected { background: #0a246a; color: #fff; }
  .thumb { width: 40px; height: 40px; background: #ccc; border: 1px solid #999; display: flex; align-items: center; justify-content: center; font-size: 0.6875rem; color: #666; }
  .image-name { font-size: 0.8125rem; }
  .button-bar { display: flex; gap: 10px; }
  .button-bar .spacer { flex: 1; }
  button { font-family: Helvetica, Arial, sans-serif; font-size: 0.8125rem; padding: 4px 10px; min-width: 60px; min-height: 37px; background: #d4d0c8; border: 2px outset #d4d0c8; cursor: pointer; }
  button.close { min-width: 80px; min-height: 50px; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">RDAdmin - Image Manager</div>
  <div class="content">
    <div class="image-list">
      <div class="image-item selected">
        <div class="thumb">IMG</div>
        <span class="image-name">podcast_cover.jpg - Podcast Cover Art</span>
      </div>
      <div class="image-item">
        <div class="thumb">IMG</div>
        <span class="image-name">episode_default.png - Default Episode Image</span>
      </div>
    </div>
    <div class="button-bar">
      <button>Add</button>
      <button>View</button>
      <button>Delete</button>
      <span class="spacer"></span>
      <button class="close">Close</button>
    </div>
  </div>
</div>
</body>
</html>
