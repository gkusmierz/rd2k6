<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EditLiveWireGpio – Edit GPIO Source</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 0.875rem; background: #d4d0c8; color: #000; }
  .window { width: 270px; margin: 20px auto; background: #d4d0c8; border: 2px outset #d4d0c8; }
  .titlebar { background: #4a6ea5; color: #fff; padding: 3px 6px; font-weight: 700; font-size: 0.875rem; }
  .content { padding: 10px; }
  .title { text-align: center; font-weight: 700; font-size: 0.8125rem; margin-bottom: 6px; }
  .form-row { display: flex; align-items: center; margin-bottom: 2px; }
  label { font-size: 0.8125rem; text-align: right; padding-right: 4px; width: 115px; }
  input[type=text] { font-size: 0.8125rem; border: 2px inset #d4d0c8; padding: 1px 4px; background: #fff; }
  input.spin { width: 60px; text-align: right; }
  .button-bar { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
  button { font-family: Helvetica, Arial, sans-serif; font-size: 0.8125rem; padding: 4px 16px; min-width: 80px; min-height: 50px; background: #d4d0c8; border: 2px outset #d4d0c8; cursor: pointer; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">RDAdmin - Edit GPIO Source</div>
  <div class="content">
    <div class="title">GPIO Lines 1 - 5</div>
    <div class="form-row">
      <label>Livewire Source:</label>
      <input type="text" class="spin" value="101">
    </div>
    <div class="form-row">
      <label>Surface Address:</label>
      <input type="text" style="width:120px;" value="192.168.1.100">
    </div>
    <div class="button-bar">
      <button>&amp;OK</button>
      <button>&amp;Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
