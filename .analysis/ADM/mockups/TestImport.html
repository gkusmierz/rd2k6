<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TestImport - RDAdmin - Test Music Import</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwindcss.config = {
  theme: { extend: {
    colors: { 'app-bg':'#d4d0c8','app-panel':'#ffffff','app-input':'#ffffff','app-btn':'#d4d0c8','app-btn-hover':'#e0dcd4','app-titlebar':'#4a6ea5','app-selection':'#0a246a','app-text':'#000000','app-border':'#808080','app-border-light':'#ffffff','app-border-dark':'#404040' },
    borderRadius: { 'app':'0px' },
    fontSize: { 'app-label':'0.8125rem','app-title':'0.875rem' }
  }}
}
</script>
<style>
  .btn-3d { box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #ffffff; }
  .input-sunken { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
</style>
</head>
<body class="bg-app-bg font-['Helvetica','Arial',system-ui,sans-serif] text-app-text text-app-label">
<div class="w-[700px] min-h-[400px] border border-app-border" data-widget="TestImport" data-window-title="RDAdmin - Test Music Import">
  <div class="bg-app-titlebar text-white text-app-title font-bold px-2 py-1">RDAdmin - Test Music Import</div>
  <div class="p-3">
    <!-- Date row -->
    <div class="flex items-center gap-2 mb-2">
      <label class="font-bold text-app-label" data-widget="test_date_label">Test Date:</label>
      <input type="text" value="11/16/2020" class="w-[95px] border-2 border-app-border input-sunken bg-app-input text-app-label px-1 h-[20px]" data-widget="test_date_edit">
      <button class="bg-app-btn btn-3d rounded-app px-3 py-1 text-[0.75rem]" data-widget="select_button">Select</button>
    </div>
    <!-- Import button -->
    <button class="w-full bg-app-btn btn-3d rounded-app py-3 text-app-label font-bold mb-2" data-widget="test_import_button">Import</button>
    <!-- Separator -->
    <hr class="border-app-text mb-1">
    <!-- Filename -->
    <label class="font-bold text-app-label block mb-0.5" data-widget="test_filename_label">Using source file:</label>
    <input type="text" readonly value="/home/fredg/rivendell-reftest/fixtures/import/absolute.tfc" class="w-full border-2 border-app-border input-sunken bg-gray-200 text-app-label px-1 h-[18px] mb-2" data-widget="test_filename_edit">
    <!-- Events list -->
    <label class="font-bold text-app-label block mb-0.5" data-widget="test_events_label">Imported Events</label>
    <div class="bg-app-panel border-2 border-app-border input-sunken overflow-auto h-[150px]" data-widget="test_events_list">
      <table class="w-full text-[0.75rem]">
        <thead class="bg-app-bg sticky top-0">
          <tr>
            <th class="w-6"></th>
            <th class="text-center px-1">Start Time</th>
            <th class="text-center px-1">Cart</th>
            <th class="text-right px-1">Len</th>
            <th class="text-left px-1">Title</th>
            <th class="text-center px-1">GUID</th>
            <th class="text-center px-1">Event ID</th>
            <th class="text-center px-1">Annc Type</th>
            <th class="text-right px-1">Line</th>
          </tr>
        </thead>
        <tbody>
          <tr class="bg-app-selection text-white">
            <td class="text-center">&#9654;</td>
            <td class="text-center">01:00:00</td>
            <td class="text-center">045000</td>
            <td class="text-right">3:39</td>
            <td>Rumor Has It</td>
            <td class="text-center text-[0.6rem]">GUID456...</td>
            <td class="text-center"></td>
            <td class="text-center"></td>
            <td class="text-right">1</td>
          </tr>
          <tr>
            <td class="text-center">&#9654;</td>
            <td class="text-center">01:03:39</td>
            <td class="text-center">040005</td>
            <td class="text-right">2:58</td>
            <td>Brandy</td>
            <td class="text-center text-[0.6rem]">GUID456...</td>
            <td class="text-center"></td>
            <td class="text-center"></td>
            <td class="text-right">2</td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- Close button -->
    <div class="flex justify-end mt-2">
      <button class="bg-app-btn btn-3d rounded-app px-4 py-3 text-app-label w-[80px]" data-widget="test_close_button">Close</button>
    </div>
  </div>
</div>
</body>
</html>
