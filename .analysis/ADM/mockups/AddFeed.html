<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AddFeed – Add RSS Feed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 0.875rem; background: #d4d0c8; color: #000; }
  .window { width: 290px; margin: 20px auto; background: #d4d0c8; border: 2px outset #d4d0c8; }
  .titlebar { background: #4a6ea5; color: #fff; padding: 3px 6px; font-weight: 700; font-size: 0.875rem; }
  .content { padding: 10px; }
  .form-row { display: flex; align-items: center; margin-bottom: 6px; }
  label { font-size: 0.8125rem; text-align: right; padding-right: 4px; }
  input[type=text] { font-size: 0.8125rem; border: 2px inset #d4d0c8; padding: 1px 4px; background: #fff; }
  input[type=checkbox] { margin-right: 6px; }
  .check-row { display: flex; align-items: center; margin-bottom: 8px; margin-left: 30px; }
  .check-label { font-size: 0.8125rem; }
  .button-bar { display: flex; justify-content: flex-end; gap: 10px; }
  button { font-family: Helvetica, Arial, sans-serif; font-size: 0.8125rem; padding: 4px 16px; min-width: 80px; min-height: 50px; background: #d4d0c8; border: 2px outset #d4d0c8; cursor: pointer; }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">RDADmin - Add RSS Feed</div>
  <div class="content">
    <div class="form-row">
      <label style="width:120px;">New Feed Name:</label>
      <input type="text" style="width:140px;" maxlength="8" value="">
    </div>
    <div class="check-row">
      <input type="checkbox" checked>
      <span class="check-label">Enable Feed for All Users</span>
    </div>
    <div class="button-bar">
      <button>&amp;OK</button>
      <button>&amp;Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
