<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'app-bg': '#d4d0c8',
            'app-panel': '#ffffff',
            'app-input': '#ffffff',
            'app-btn': '#d4d0c8',
            'app-titlebar': '#4a6ea5',
            'app-selection': '#0a246a',
            'app-text': '#000000',
            'app-text-sec': '#4a4a4a',
            'app-border': '#808080',
          },
          borderRadius: { 'app': '0px' },
          fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' }
        }
      }
    }
  </script>
  <title>Select Scheduler Codes — UI Mockup</title>
  <!-- Screenshot source: rdadmin.select_scheduler_codes_dialog.png -->
  <!-- Class: RDSchedCodesDialog -->
  <!-- Design tokens: ../../design-tokens.json -->
  <!-- Generated by QTRE Phase-3 v1.2.0 -->
  <style>
    .btn-3d { border-top: 2px solid #fff; border-left: 2px solid #fff; border-bottom: 2px solid #404040; border-right: 2px solid #404040; }
    .btn-3d:active { border-top: 2px solid #404040; border-left: 2px solid #404040; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }
    .input-sunken { border-top: 2px solid #808080; border-left: 2px solid #808080; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }
  </style>
</head>
<body class="bg-app-bg p-4 font-sans text-app-label text-app-text">
  <div class="bg-app-bg mx-auto" style="width:400px; border: 2px outset #d4d0c8;">
    <div class="bg-app-titlebar text-white px-4 py-1 text-app-title font-bold">
      Select Scheduler Codes
    </div>
    <div class="p-3">
      <!-- Dual-list selector (RDListSelector) — single mode shown, dual mode uses remove_codes_sel too -->
      <!-- Note: In dual/bulk mode (remove_codes!=NULL), a second RDListSelector (remove_codes_sel) appears alongside -->
      <div data-widget="codes_sel" class="flex gap-3 items-start">
      <!-- Hidden in single mode: <div data-widget="remove_codes_sel"> ... </div> --
        <!-- Available Codes -->
        <div class="flex-1">
          <div class="font-bold text-center mb-1">Available Codes</div>
          <div class="input-sunken bg-app-panel overflow-auto" style="height:160px;">
            <div class="p-1 space-y-0.5">
              <div>FRED</div>
              <div>WCR-A</div>
              <div class="bg-app-selection text-white px-1">WCR-B</div>
              <div>WCR-D</div>
              <div>WCR-E</div>
              <div>WCR-F</div>
            </div>
          </div>
        </div>
        <!-- Transfer buttons -->
        <div class="flex flex-col gap-2 pt-10">
          <button class="btn-3d bg-app-btn px-3 py-1">Add &gt;&gt;</button>
          <button class="btn-3d bg-app-btn px-3 py-1">&lt;&lt; Remove</button>
        </div>
        <!-- Assigned Codes -->
        <div class="flex-1">
          <div class="font-bold text-center mb-1">Assigned Codes</div>
          <div class="input-sunken bg-app-panel overflow-auto" style="height:160px;">
            <div class="p-1 space-y-0.5">
              <div>WCR-C</div>
              <div>WCR-X</div>
            </div>
          </div>
        </div>
      </div>
      <!-- Buttons -->
      <div class="flex justify-end gap-2 pt-3">
        <button data-widget="edit_ok_button" class="btn-3d bg-app-btn px-6 py-1">OK</button>
        <button data-widget="edit_cancel_button" class="btn-3d bg-app-btn px-4 py-1">Cancel</button>
      </div>
    </div>
  </div>
</body>
</html>
