<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'app-bg': '#d4d0c8',
            'app-text': '#000000',
            'meter-green': '#00c800',
            'meter-yellow': '#c8c800',
            'meter-red': '#c80000',
            'meter-bg': '#000000',
            'meter-dark-green': '#004400',
            'meter-dark-yellow': '#444400',
            'meter-dark-red': '#440000',
          },
          borderRadius: { 'app': '0px' },
          fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' }
        }
      }
    }
  </script>
  <title>Stereo Level Meter — UI Mockup</title>
  <!-- Screenshot source: rdairplay.audio_meter.png -->
  <!-- Class: RDStereoMeter -->
  <!-- Design tokens: ../../design-tokens.json -->
  <!-- Generated by QTRE Phase-3 v1.2.0 -->
  <style>
    .meter-bar { display: flex; gap: 1px; height: 10px; }
    .seg { width: 4px; height: 10px; }
    .seg-green-on { background: #00c800; }
    .seg-green-off { background: #004400; }
    .seg-yellow-on { background: #c8c800; }
    .seg-yellow-off { background: #444400; }
    .seg-red-on { background: #c80000; }
    .seg-red-off { background: #440000; }
  </style>
</head>
<body class="bg-app-bg p-4 font-sans text-app-label text-app-text">
  <div class="bg-meter-bg mx-auto p-2" style="width:335px; height:60px; border: 1px solid #404040;">
    <!-- L channel -->
    <div class="flex items-center gap-2 mb-1">
      <span class="text-white font-bold text-xs" style="width:12px;">L</span>
      <div class="meter-bar flex-1">
        <!-- Green segments (low range: -30 to -5 dB) -->
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <!-- Yellow segments (high range: -5 to 0 dB) -->
        <div class="seg seg-yellow-on"></div><div class="seg seg-yellow-on"></div><div class="seg seg-yellow-on"></div>
        <div class="seg seg-yellow-on"></div><div class="seg seg-yellow-off"></div>
        <!-- Red segments (clip range: 0 to +8 dB) -->
        <div class="seg seg-red-on"></div><div class="seg seg-red-off"></div><div class="seg seg-red-off"></div>
        <div class="seg seg-red-off"></div><div class="seg seg-red-off"></div>
      </div>
    </div>
    <!-- Scale labels -->
    <div class="flex text-white text-center" style="font-size:0.55rem; padding-left: 16px;">
      <span style="flex:5;">-30</span>
      <span style="flex:5;">-25</span>
      <span style="flex:5;">-20</span>
      <span style="flex:5;">-15</span>
      <span style="flex:5;">-10</span>
      <span style="flex:5;">-5</span>
      <span style="flex:3;">0</span>
      <span style="flex:3;">+8</span>
    </div>
    <!-- R channel -->
    <div class="flex items-center gap-2 mt-1">
      <span class="text-white font-bold text-xs" style="width:12px;">R</span>
      <div class="meter-bar flex-1">
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-on"></div><div class="seg seg-green-on"></div><div class="seg seg-green-on"></div>
        <div class="seg seg-green-off"></div><div class="seg seg-green-off"></div><div class="seg seg-green-off"></div>
        <div class="seg seg-green-off"></div><div class="seg seg-green-off"></div><div class="seg seg-green-off"></div>
        <div class="seg seg-green-off"></div><div class="seg seg-green-off"></div><div class="seg seg-green-off"></div>
        <div class="seg seg-green-off"></div><div class="seg seg-green-off"></div><div class="seg seg-green-off"></div>
        <div class="seg seg-green-off"></div><div class="seg seg-green-off"></div><div class="seg seg-green-off"></div>
        <div class="seg seg-green-off"></div><div class="seg seg-green-off"></div><div class="seg seg-green-off"></div>
        <div class="seg seg-green-off"></div><div class="seg seg-green-off"></div><div class="seg seg-green-off"></div>
        <div class="seg seg-yellow-off"></div><div class="seg seg-yellow-off"></div><div class="seg seg-yellow-off"></div>
        <div class="seg seg-yellow-off"></div><div class="seg seg-yellow-off"></div>
        <div class="seg seg-red-off"></div><div class="seg seg-red-off"></div><div class="seg seg-red-off"></div>
        <div class="seg seg-red-off"></div><div class="seg seg-red-off"></div>
      </div>
    </div>
  </div>
</body>
</html>
