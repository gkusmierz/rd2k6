<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'app-bg': '#d4d0c8',
            'app-panel': '#ffffff',
            'app-input': '#ffffff',
            'app-btn': '#d4d0c8',
            'app-titlebar': '#4a6ea5',
            'app-selection': '#0a246a',
            'app-text': '#000000',
            'app-text-sec': '#4a4a4a',
            'app-border': '#808080',
          },
          borderRadius: { 'app': '0px' },
          fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' }
        }
      }
    }
  </script>
  <title>Select Date — UI Mockup</title>
  <!-- Screenshot source: rdlogmanager.select_date_dialog.png -->
  <!-- Class: RDDateDialog -->
  <!-- Design tokens: ../../design-tokens.json -->
  <!-- Generated by QTRE Phase-3 v1.2.0 -->
  <style>
    .btn-3d { border-top: 2px solid #fff; border-left: 2px solid #fff; border-bottom: 2px solid #404040; border-right: 2px solid #404040; }
    .btn-3d:active { border-top: 2px solid #404040; border-left: 2px solid #404040; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }
    .input-sunken { border-top: 2px solid #808080; border-left: 2px solid #808080; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }
    .cal-day { width: 26px; height: 22px; text-align: center; line-height: 22px; cursor: pointer; }
    .cal-day:hover { background: #e0dcd4; }
    .cal-day.selected { background: #0a246a; color: #fff; }
    .cal-day.weekend { color: #cc0000; }
    .cal-header { font-weight: bold; text-align: center; width: 26px; }
  </style>
</head>
<body class="bg-app-bg p-4 font-sans text-app-label text-app-text">
  <div class="bg-app-bg mx-auto" style="width:240px; border: 2px outset #d4d0c8;">
    <div class="bg-app-titlebar text-white px-4 py-1 text-app-title font-bold">
      Select Date
    </div>
    <div class="p-3">
      <!-- Month/Year selectors -->
      <div class="flex items-center gap-2 mb-2">
        <select class="input-sunken bg-app-input px-1 py-0.5 flex-1 text-xs">
          <option>November</option>
        </select>
        <select class="input-sunken bg-app-input px-1 py-0.5 text-xs" style="width:60px;">
          <option>2017</option>
        </select>
      </div>
      <!-- Calendar grid (RDDatePicker) -->
      <div data-widget="date_picker" class="bg-app-panel input-sunken p-1">
        <div class="flex justify-between text-xs">
          <span class="cal-header">Mo</span>
          <span class="cal-header">Tu</span>
          <span class="cal-header">We</span>
          <span class="cal-header">Th</span>
          <span class="cal-header">Fr</span>
          <span class="cal-header weekend">Sa</span>
          <span class="cal-header weekend">Su</span>
        </div>
        <!-- Week 1 -->
        <div class="flex justify-between text-xs">
          <span class="cal-day"></span>
          <span class="cal-day"></span>
          <span class="cal-day selected">1</span>
          <span class="cal-day">2</span>
          <span class="cal-day">3</span>
          <span class="cal-day weekend">4</span>
          <span class="cal-day weekend">5</span>
        </div>
        <!-- Week 2 -->
        <div class="flex justify-between text-xs">
          <span class="cal-day">6</span>
          <span class="cal-day">7</span>
          <span class="cal-day">8</span>
          <span class="cal-day">9</span>
          <span class="cal-day">10</span>
          <span class="cal-day weekend">11</span>
          <span class="cal-day weekend">12</span>
        </div>
        <!-- Week 3 -->
        <div class="flex justify-between text-xs">
          <span class="cal-day">13</span>
          <span class="cal-day">14</span>
          <span class="cal-day">15</span>
          <span class="cal-day">16</span>
          <span class="cal-day">17</span>
          <span class="cal-day weekend">18</span>
          <span class="cal-day weekend">19</span>
        </div>
        <!-- Week 4 -->
        <div class="flex justify-between text-xs">
          <span class="cal-day">20</span>
          <span class="cal-day">21</span>
          <span class="cal-day">22</span>
          <span class="cal-day">23</span>
          <span class="cal-day">24</span>
          <span class="cal-day weekend">25</span>
          <span class="cal-day weekend">26</span>
        </div>
        <!-- Week 5 -->
        <div class="flex justify-between text-xs">
          <span class="cal-day">27</span>
          <span class="cal-day">28</span>
          <span class="cal-day">29</span>
          <span class="cal-day">30</span>
          <span class="cal-day"></span>
          <span class="cal-day"></span>
          <span class="cal-day"></span>
        </div>
      </div>
      <!-- Buttons -->
      <div class="flex justify-end gap-2 pt-3">
        <button data-widget="ok_button" class="btn-3d bg-app-btn px-6 py-1">OK</button>
        <button data-widget="cancel_button" class="btn-3d bg-app-btn px-4 py-1">Cancel</button>
      </div>
    </div>
  </div>
</body>
</html>
