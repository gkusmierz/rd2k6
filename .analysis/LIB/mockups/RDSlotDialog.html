<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'app-bg': '#d4d0c8',
            'app-panel': '#ffffff',
            'app-input': '#ffffff',
            'app-btn': '#d4d0c8',
            'app-titlebar': '#4a6ea5',
            'app-selection': '#0a246a',
            'app-text': '#000000',
            'app-text-sec': '#4a4a4a',
            'app-border': '#808080',
          },
          borderRadius: { 'app': '0px' },
          fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' }
        }
      }
    }
  </script>
  <title>Edit Slot Options — UI Mockup</title>
  <!-- Screenshot source: rdcartslots.rdcartslots.edit_slot_options_dialog.png -->
  <!-- Class: RDSlotDialog -->
  <!-- Design tokens: ../../design-tokens.json -->
  <!-- Generated by QTRE Phase-3 v1.2.0 -->
  <style>
    .btn-3d { border-top: 2px solid #fff; border-left: 2px solid #fff; border-bottom: 2px solid #404040; border-right: 2px solid #404040; }
    .btn-3d:active { border-top: 2px solid #404040; border-left: 2px solid #404040; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }
    .input-sunken { border-top: 2px solid #808080; border-left: 2px solid #808080; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }
  </style>
</head>
<body class="bg-app-bg p-4 font-sans text-app-label text-app-text">
  <div class="bg-app-bg mx-auto" style="width:300px; border: 2px outset #d4d0c8;">
    <div class="bg-app-titlebar text-white px-4 py-1 text-app-title font-bold">
      RDCartSlots - Edit Slot Options
    </div>
    <div class="p-4 space-y-3">
      <!-- Slot Mode -->
      <div class="flex items-center gap-2">
        <label data-widget="edit_mode_label" class="text-right" style="min-width:100px;">Slot Mode:</label>
        <select data-widget="edit_mode_box" class="input-sunken bg-app-input px-1 py-0.5 flex-1">
          <option>Cart Deck</option>
          <option>Breakaway</option>
        </select>
      </div>
      <!-- Play Mode -->
      <div class="flex items-center gap-2">
        <label data-widget="edit_hook_label" class="text-right" style="min-width:100px;">Play Mode:</label>
        <select data-widget="edit_hook_box" class="input-sunken bg-app-input px-1 py-0.5 flex-1">
          <option>Full Cart</option>
          <option>Hook</option>
        </select>
      </div>
      <!-- At Playout End -->
      <div class="flex items-center gap-2">
        <label data-widget="edit_stop_action_label" class="text-right" style="min-width:100px;">At Playout End:</label>
        <select data-widget="edit_stop_action_box" class="input-sunken bg-app-input px-1 py-0.5 flex-1">
          <option>Unload Slot</option>
          <option>Recue</option>
          <option>Loop</option>
        </select>
      </div>
      <!-- Buttons -->
      <div class="flex justify-end gap-2 pt-2">
        <button data-widget="edit_ok_button" class="btn-3d bg-app-btn px-6 py-1">OK</button>
        <button data-widget="edit_cancel_button" class="btn-3d bg-app-btn px-4 py-1">Cancel</button>
      </div>
    </div>
  </div>
</body>
</html>
