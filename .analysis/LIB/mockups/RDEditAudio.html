<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'app-bg': '#d4d0c8',
            'app-panel': '#ffffff',
            'app-input': '#ffffff',
            'app-btn': '#d4d0c8',
            'app-titlebar': '#4a6ea5',
            'app-selection': '#0a246a',
            'app-text': '#000000',
            'app-text-sec': '#4a4a4a',
            'app-border': '#808080',
            'app-border-light': '#ffffff',
            'app-border-dark': '#404040',
            'marker-start-end': '#cc0000',
            'marker-talk': '#0000cc',
            'marker-segue': '#00cc00',
            'marker-fade': '#cccc00',
            'marker-hook': '#cc00cc',
          },
          borderRadius: { 'app': '0px' },
          fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' }
        }
      }
    }
  </script>
  <title>Edit Audio — UI Mockup</title>
  <!-- Screenshot source: rdlibrary.edit_marker_dialog.png -->
  <!-- Class: RDEditAudio -->
  <!-- Design tokens: ../../design-tokens.json -->
  <!-- Generated by QTRE Phase-3 v1.2.0 -->
  <style>
    .btn-3d { border-top: 2px solid #fff; border-left: 2px solid #fff; border-bottom: 2px solid #404040; border-right: 2px solid #404040; }
    .btn-3d:active { border-top: 2px solid #404040; border-left: 2px solid #404040; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }
    .input-sunken { border-top: 2px solid #808080; border-left: 2px solid #808080; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }
    .waveform { background: #e8e8e8; position: relative; }
    .waveform-channel { background: #f0f0f0; border: 1px solid #808080; }
    .marker-btn { font-size: 0.75rem; font-weight: bold; color: #fff; padding: 4px 6px; text-align: center; line-height: 1.1; min-width: 50px; }
    .marker-edit { font-family: monospace; font-size: 0.75rem; width: 70px; text-align: center; }
  </style>
</head>
<body class="bg-app-bg p-2 font-sans text-app-label text-app-text">
  <div class="bg-app-bg mx-auto overflow-hidden" style="max-width:840px; border: 2px outset #d4d0c8;">
    <div class="bg-app-titlebar text-white px-4 py-1 text-app-title font-bold">
      RDLibrary - Edit Audio
    </div>
    <div class="p-2">
      <div class="flex gap-2">
        <!-- Main area -->
        <div class="flex-1">
          <!-- Waveform L -->
          <div class="waveform-channel mb-1 relative" style="height:120px;">
            <span class="absolute top-1 left-1 font-bold text-lg">L</span>
            <div class="absolute inset-0 flex items-center justify-center text-app-text-sec text-xs">[Waveform L channel]</div>
          </div>
          <!-- Waveform R -->
          <div class="waveform-channel mb-2 relative" style="height:120px;">
            <span class="absolute top-1 left-1 font-bold text-lg">R</span>
            <div class="absolute inset-0 flex items-center justify-center text-app-text-sec text-xs">[Waveform R channel]</div>
          </div>
          <!-- Position / Transport / Meter row -->
          <div class="flex items-center gap-3 mb-2">
            <div class="flex gap-2 text-xs">
              <div class="text-center"><div class="text-app-text-sec">Position</div><input data-widget="edit_overall_edit" class="input-sunken marker-edit bg-app-input" value="-0:00:00.5" readonly></div>
              <div class="text-center"><div class="text-app-text-sec">&lt;none&gt;</div><input class="input-sunken marker-edit bg-app-input" value="0:00:0.0" readonly></div>
              <div class="text-center"><div class="text-app-text-sec">Length</div><input data-widget="edit_size_edit" class="input-sunken marker-edit bg-app-input" value="0:06:01.2" readonly></div>
            </div>
            <!-- Transport buttons -->
            <div class="flex gap-1">
              <button data-widget="edit_play_cursor_button" class="btn-3d bg-app-btn p-1" title="Play Between">&#9654;&#124;</button>
              <button data-widget="edit_play_start_button" class="btn-3d bg-app-btn p-1" title="Play">&#9654;</button>
              <button data-widget="edit_pause_button" class="btn-3d bg-app-btn p-1" title="Pause">&#10074;&#10074;</button>
              <button data-widget="edit_stop_button" class="btn-3d bg-app-btn p-1" title="Stop">&#9632;</button>
              <button data-widget="edit_loop_button" class="btn-3d bg-app-btn p-1" title="Loop">&#10227;</button>
            </div>
            <!-- Meter -->
            <div data-widget="edit_meter" class="bg-black text-white text-xs px-2 py-1 flex-1" style="min-width:180px;">
              <div class="flex items-center gap-1"><span>L</span><div class="flex-1 h-2 bg-green-700"></div></div>
              <div class="text-center text-gray-400" style="font-size:0.6rem;">-30 &nbsp; -25 &nbsp; -20 &nbsp; -15 &nbsp; -10 &nbsp; -5 &nbsp; 0 &nbsp; +8</div>
              <div class="flex items-center gap-1"><span>R</span><div class="flex-1 h-2 bg-green-700"></div></div>
            </div>
          </div>
          <!-- Marker buttons row 1: Cut Start/End, Trim, Threshold, Gain -->
          <div class="flex items-start gap-2 mb-2">
            <div class="flex gap-1">
              <div class="text-center">
                <button data-widget="edit_cue_button_start" class="marker-btn bg-marker-start-end rounded-none">Cut<br>Start</button>
                <input data-widget="edit_cursor_edit_start" class="input-sunken marker-edit bg-app-input mt-0.5" value="0:00:00.5">
              </div>
              <div class="text-center">
                <button data-widget="edit_cue_button_end" class="marker-btn bg-marker-start-end rounded-none">Cut<br>End</button>
                <input data-widget="edit_cursor_edit_end" class="input-sunken marker-edit bg-app-input mt-0.5" value="0:06:01.8">
              </div>
            </div>
            <div class="flex gap-1">
              <button data-widget="trim_start_button" class="btn-3d bg-app-btn px-2 py-1 text-xs text-center leading-tight">Trim<br>Start</button>
              <button data-widget="trim_end_button" class="btn-3d bg-app-btn px-2 py-1 text-xs text-center leading-tight">Trim<br>End</button>
            </div>
            <div class="flex items-center gap-1 text-xs">
              <span>Threshold</span>
              <input data-widget="edit_trim_box" type="number" class="input-sunken bg-app-input w-12 text-center" value="-40">
              <span>dB</span>
            </div>
            <div class="flex items-center gap-1 text-xs">
              <span>Cut Gain</span>
              <input data-widget="edit_gain_edit" class="input-sunken marker-edit bg-app-input" value="0.0 dB">
            </div>
            <div>
              <button data-widget="edit_remove_button" class="btn-3d bg-app-btn px-2 py-2 text-xs text-center leading-tight font-bold">Remove<br>Marker</button>
            </div>
            <div class="flex items-center gap-1 text-xs">
              <input data-widget="edit_overlap_box" type="checkbox">
              <span>No Fade on Segue Out</span>
            </div>
          </div>
          <!-- Marker buttons row 2: Fade, Talk, Segue, Hook -->
          <div class="flex gap-1 flex-wrap">
            <div class="text-center">
              <button data-widget="edit_cue_button_fadeup" class="marker-btn bg-marker-fade rounded-none">Fade<br>Up</button>
              <input data-widget="edit_cursor_edit_fadeup" class="input-sunken marker-edit bg-app-input mt-0.5" value="">
            </div>
            <div class="text-center">
              <button data-widget="edit_cue_button_fadedown" class="marker-btn bg-marker-fade rounded-none">Fade<br>Down</button>
              <input data-widget="edit_cursor_edit_fadedown" class="input-sunken marker-edit bg-app-input mt-0.5" value="">
            </div>
            <div class="text-center">
              <button data-widget="edit_cue_button_talkstart" class="marker-btn bg-marker-talk rounded-none">Talk<br>Start</button>
              <input data-widget="edit_cursor_edit_talkstart" class="input-sunken marker-edit bg-app-input mt-0.5" value="0:00:00.5">
            </div>
            <div class="text-center">
              <button data-widget="edit_cue_button_talkend" class="marker-btn bg-marker-talk rounded-none">Talk<br>End</button>
              <input data-widget="edit_cursor_edit_talkend" class="input-sunken marker-edit bg-app-input mt-0.5" value="0:00:24.5">
            </div>
            <div class="text-center">
              <button data-widget="edit_cue_button_seguestart" class="marker-btn bg-marker-segue rounded-none">Segue<br>Start</button>
              <input data-widget="edit_cursor_edit_seguestart" class="input-sunken marker-edit bg-app-input mt-0.5" value="0:05:57.4">
            </div>
            <div class="text-center">
              <button data-widget="edit_cue_button_segueend" class="marker-btn bg-marker-segue rounded-none">Segue<br>End</button>
              <input data-widget="edit_cursor_edit_segueend" class="input-sunken marker-edit bg-app-input mt-0.5" value="0:06:01.8">
            </div>
            <div class="text-center">
              <button data-widget="edit_cue_button_hookstart" class="marker-btn bg-marker-hook rounded-none">Hook<br>Start</button>
              <input data-widget="edit_cursor_edit_hookstart" class="input-sunken marker-edit bg-app-input mt-0.5" value="">
            </div>
            <div class="text-center">
              <button data-widget="edit_cue_button_hookend" class="marker-btn bg-marker-hook rounded-none">Hook<br>End</button>
              <input data-widget="edit_cursor_edit_hookend" class="input-sunken marker-edit bg-app-input mt-0.5" value="">
            </div>
          </div>
        </div>
        <!-- Right sidebar -->
        <div class="flex flex-col gap-1" style="width:70px;">
          <fieldset class="border border-app-border p-1 text-center">
            <legend class="text-xs px-1">Amplitude</legend>
            <button data-widget="y_up_button" class="btn-3d bg-app-btn w-full py-2 text-lg">&#9650;</button>
            <button data-widget="y_down_button" class="btn-3d bg-app-btn w-full py-2 text-lg mt-1">&#9660;</button>
          </fieldset>
          <fieldset class="border border-app-border p-1 text-center">
            <legend class="text-xs px-1">Time</legend>
            <button data-widget="x_full_in_button" class="btn-3d bg-app-btn w-full py-1 text-xs leading-tight">Full<br>In</button>
            <button data-widget="x_up_button" class="btn-3d bg-app-btn w-full py-2 text-lg mt-1">&#9650;</button>
            <button data-widget="x_down_button" class="btn-3d bg-app-btn w-full py-2 text-lg mt-1">&#9660;</button>
            <button data-widget="x_full_button" class="btn-3d bg-app-btn w-full py-1 text-xs leading-tight mt-1">Full<br>Out</button>
          </fieldset>
          <fieldset class="border border-app-border p-1 text-center">
            <legend class="text-xs px-1">Goto</legend>
            <button data-widget="goto_cursor_button" class="btn-3d bg-app-btn w-full py-1 text-xs">Cursor</button>
            <button data-widget="goto_home_button" class="btn-3d bg-app-btn w-full py-1 text-xs mt-1">Home</button>
            <button data-widget="goto_end_button" class="btn-3d bg-app-btn w-full py-1 text-xs mt-1">End</button>
          </fieldset>
          <button data-widget="save_button" class="btn-3d bg-app-btn w-full py-2 text-xs font-bold mt-2">Save</button>
          <button data-widget="cancel_button" class="btn-3d bg-app-btn w-full py-2 text-xs">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
