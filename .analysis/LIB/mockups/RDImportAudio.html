<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'app-bg': '#d4d0c8',
            'app-panel': '#ffffff',
            'app-input': '#ffffff',
            'app-btn': '#d4d0c8',
            'app-titlebar': '#4a6ea5',
            'app-selection': '#0a246a',
            'app-text': '#000000',
            'app-text-sec': '#4a4a4a',
            'app-border': '#808080',
          },
          borderRadius: { 'app': '0px' },
          fontSize: { 'app-label': '0.8125rem', 'app-title': '0.875rem' }
        }
      }
    }
  </script>
  <title>Import/Export Audio File — UI Mockup</title>
  <!-- Screenshot source: rdlibrary.import_export_dialog.png -->
  <!-- Class: RDImportAudio -->
  <!-- Design tokens: ../../design-tokens.json -->
  <!-- Generated by QTRE Phase-3 v1.2.0 -->
  <style>
    .btn-3d { border-top: 2px solid #fff; border-left: 2px solid #fff; border-bottom: 2px solid #404040; border-right: 2px solid #404040; }
    .btn-3d:active { border-top: 2px solid #404040; border-left: 2px solid #404040; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }
    .input-sunken { border-top: 2px solid #808080; border-left: 2px solid #808080; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }
    fieldset { border: 2px groove #d4d0c8; }
  </style>
</head>
<body class="bg-app-bg p-4 font-sans text-app-label text-app-text">
  <div class="bg-app-bg max-w-md mx-auto" style="border: 2px outset #d4d0c8;">
    <div class="bg-app-titlebar text-white px-4 py-1 text-app-title font-bold">
      Import/Export Audio File
    </div>
    <div class="p-3 space-y-3">
      <!-- Import File section -->
      <fieldset class="p-2 space-y-1.5">
        <legend class="flex items-center gap-1 px-1">
          <input data-widget="import_importmode_button" type="radio" name="mode" checked>
          <span class="font-bold">Import File</span>
        </legend>
        <div class="flex items-center gap-1">
          <label style="min-width:60px;">Filename:</label>
          <input data-widget="import_in_filename_edit" type="text" class="input-sunken flex-1 px-1 py-0.5 bg-app-input text-xs" value="edg/wav/infrared_rabbit/Darker_Infrared Rabbit.wav">
          <button data-widget="import_in_selector_button" class="btn-3d bg-app-btn px-2 py-0.5">Select</button>
        </div>
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-1">
            <input data-widget="import_in_metadata_box" type="checkbox" checked>
            <label>Import file metadata</label>
          </div>
          <div class="flex items-center gap-1">
            <label>Channels:</label>
            <select data-widget="import_channels_box" class="input-sunken bg-app-input px-1 py-0.5" style="width:40px;"><option>2</option><option>1</option></select>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-1">
            <input data-widget="import_autotrim_box" type="checkbox">
            <label>Autotrim</label>
          </div>
          <div class="flex items-center gap-1">
            <label>Level:</label>
            <input data-widget="import_autotrim_spin" type="number" class="input-sunken bg-app-input w-12 text-center" value="-40">
            <label>dBFS</label>
          </div>
        </div>
      </fieldset>
      <!-- Export File section -->
      <fieldset class="p-2 space-y-1.5">
        <legend class="flex items-center gap-1 px-1">
          <input data-widget="import_exportmode_button" type="radio" name="mode">
          <span class="font-bold">Export File</span>
        </legend>
        <div class="flex items-center gap-1">
          <label class="text-app-text-sec" style="min-width:60px;">Filename:</label>
          <input data-widget="import_out_filename_edit" type="text" class="input-sunken flex-1 px-1 py-0.5 bg-gray-100 text-app-text-sec" disabled>
          <button data-widget="import_out_selector_button" class="btn-3d bg-app-btn px-2 py-0.5 text-app-text-sec" disabled>Select</button>
        </div>
        <div class="flex items-center gap-1">
          <input data-widget="import_out_metadata_box" type="checkbox" disabled>
          <label class="text-app-text-sec">Export file metadata</label>
        </div>
        <div class="flex items-center gap-1">
          <label class="text-app-text-sec" style="min-width:60px;">Format:</label>
          <input data-widget="import_format_edit" type="text" class="input-sunken flex-1 px-1 py-0.5 bg-gray-100 text-app-text-sec" value="PCM16, 44100 samp/sec, Stereo" disabled>
          <button data-widget="import_out_format_button" class="btn-3d bg-app-btn px-2 py-0.5 text-app-text-sec" disabled>Set</button>
        </div>
      </fieldset>
      <!-- Progress bar -->
      <div data-widget="import_bar" class="input-sunken bg-app-panel h-4"></div>
      <!-- Normalize + buttons -->
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <input data-widget="import_normalize_box" type="checkbox" checked>
          <label class="font-bold">Normalize</label>
          <label>Level:</label>
          <input data-widget="import_normalize_spin" type="number" class="input-sunken bg-app-input w-12 text-center" value="-11">
          <label>dBFS</label>
        </div>
        <div class="flex gap-2">
          <button data-widget="import_import_button" class="btn-3d bg-app-btn px-4 py-1">Import</button>
          <button data-widget="import_cancel_button" class="btn-3d bg-app-btn px-4 py-1">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
